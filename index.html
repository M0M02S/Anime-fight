<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Raketenbauer & Flugsimulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 900px;
            background: #03050a;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .ui-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }
        .panel {
            pointer-events: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
            background: rgba(10, 15, 30, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 12px 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        button {
            background: #1e2a4a;
            color: white;
            border: none;
            border-radius: 36px;
            padding: 14px 18px;
            font-size: 16px;
            font-weight: bold;
            min-width: 70px;
            box-shadow: 0 4px 10px rgba(0,180,255,0.4);
            transition: background 0.15s;
            touch-action: manipulation;
        }
        button:active {
            background: #3a5a9a;
        }
        .thrust-btn {
            background: #d94f1a;
            flex: 1;
            font-size: 22px;
            letter-spacing: 2px;
        }
        .control-row {
            display: flex;
            width: 100%;
            gap: 10px;
            align-items: center;
        }
        .slider-container {
            flex: 2;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 5px 10px;
            height: 50px;
        }
        input[type=range] {
            width: 100%;
            height: 10px;
            -webkit-appearance: none;
            background: linear-gradient(to right, #ffaa00, #ff5500);
            border-radius: 5px;
        }
        .fuel-bar {
            width: 100%;
            height: 12px;
            background: #222;
            border-radius: 6px;
            margin: 5px 0;
        }
        .fuel-fill {
            height: 100%;
            width: 100%;
            background: #f0b400;
            border-radius: 6px;
            transition: width 0.1s;
        }
        .info-text {
            color: white;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 10px black;
        }
    </style>
</head>
<body>
<div id="container">
    <canvas id="gameCanvas" width="500" height="900"></canvas>
    <div class="ui-overlay" id="uiOverlay">
        <!-- Build-Modus -->
        <div id="buildPanel" class="panel">
            <button id="addTank">➕ Tank</button>
            <button id="addEngine">🚀 Triebwerk</button>
            <button id="removePart">🗑️ Entfernen</button>
            <button id="launchBtn" style="background:#2a7a2a;">START</button>
        </div>
        <!-- Flug-Modus -->
        <div id="flightPanel" class="panel" style="display: none;">
            <div class="info-text" id="speedDisplay">0.0 m/s</div>
            <div class="fuel-bar"><div class="fuel-fill" id="fuelFill"></div></div>
            <div class="control-row">
                <button id="leftBtn">◀</button>
                <div class="slider-container">
                    <input type="range" id="throttleSlider" min="0" max="100" value="70">
                </div>
                <button id="rightBtn">▶</button>
            </div>
            <button id="thrustBtn" class="thrust-btn">SCHUB</button>
            <button id="backToBuild" style="background:#555;">🔧 Bauen</button>
        </div>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI Elemente
        const buildPanel = document.getElementById('buildPanel');
        const flightPanel = document.getElementById('flightPanel');
        const speedDisplay = document.getElementById('speedDisplay');
        const fuelFill = document.getElementById('fuelFill');
        const throttleSlider = document.getElementById('throttleSlider');

        // ---- SPIELZUSTAND ----
        let mode = 'build'; // 'build' oder 'flight'

        // Raketen-Teile (von oben nach unten)
        let parts = [];
        // Standard: Kommandokapsel ganz oben
        const pod = { type: 'pod', mass: 2.0, fuel: 0, thrust: 0, name: 'Kapsel' };
        parts.push(pod);

        // Physik-Variablen
        let rocket = {
            x: 250, y: 450,        // Position des Schwerpunkts
            vx: 0, vy: 0,
            angle: 0,              // 0 = Nase zeigt nach oben
            angularVel: 0,
        };

        const GRAVITY = 15;        // Pixel/s² nach unten
        const THRUST_FORCE = 280;  // Schubkraft des Triebwerks (Pixel/s² * Masse?)
        const FUEL_CONSUMPTION = 60; // Treibstoffverbrauch pro Sekunde bei vollem Schub

        // Steuerungszustände
        let leftPressed = false;
        let rightPressed = false;
        let thrustPressed = false;
        let throttle = 0.7;        // 0..1

        // Sterne
        let stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 2 + 0.5,
                b: Math.random() * 0.6 + 0.4
            });
        }

        // ---- RAKETENBAU ----
        function updateRocketMassProperties() {
            if (parts.length === 0) return;
            // Gesamtmasse
            let totalMass = 0;
            parts.forEach(p => totalMass += p.mass + (p.fuel || 0));

            // Schwerpunkt relativ zur Oberseite der Kapsel (Teil 0)
            let momentSum = 0;
            let currentY = 0; // y-Koordinate der Oberkante des aktuellen Teils
            for (let part of parts) {
                let partMass = part.mass + (part.fuel || 0);
                let partHeight = getPartHeight(part);
                let partCenterY = currentY + partHeight / 2;
                momentSum += partMass * partCenterY;
                currentY += partHeight;
            }
            let comFromTop = momentSum / totalMass;
            // Speichere für Zeichnung: position jeder Teil relativ zum Schwerpunkt
            let yOffset = -comFromTop; // Schwerpunkt liegt bei y=0 im lokalen System
            currentY = 0;
            for (let part of parts) {
                let partHeight = getPartHeight(part);
                part._localY = yOffset + currentY;
                part._height = partHeight;
                currentY += partHeight;
            }
            rocket.totalMass = totalMass;
            rocket.comFromTop = comFromTop;

            // Trägheitsmoment (Punktmassen im Abstand zum Schwerpunkt)
            let inertia = 0;
            currentY = 0;
            for (let part of parts) {
                let partMass = part.mass + (part.fuel || 0);
                let partCenterY = currentY + getPartHeight(part)/2;
                let distToCom = partCenterY - comFromTop;
                inertia += partMass * distToCom * distToCom;
                currentY += getPartHeight(part);
            }
            rocket.inertia = Math.max(inertia, 0.1); // verhindert Division durch Null
        }

        function getPartHeight(part) {
            switch(part.type) {
                case 'pod': return 28;
                case 'tank': return 38;
                case 'engine': return 24;
                default: return 20;
            }
        }

        function addTank() {
            // Tank zwischen Kapsel und Triebwerk (falls vorhanden) einfügen
            let engineIndex = parts.findIndex(p => p.type === 'engine');
            let insertIndex = engineIndex !== -1 ? engineIndex : parts.length;
            let tank = { type: 'tank', mass: 1.0, fuel: 4.0, thrust: 0, name: 'Tank' };
            parts.splice(insertIndex, 0, tank);
            updateRocketMassProperties();
        }

        function addEngine() {
            if (parts.some(p => p.type === 'engine')) {
                alert('Es ist bereits ein Triebwerk vorhanden!');
                return;
            }
            let engine = { type: 'engine', mass: 2.0, fuel: 0, thrust: THRUST_FORCE, name: 'Triebwerk' };
            parts.push(engine);
            updateRocketMassProperties();
        }

        function removeLastPart() {
            if (parts.length <= 1) return; // Kapsel bleibt
            // Entferne das letzte Teil (nicht die Kapsel)
            if (parts[parts.length-1].type === 'pod') return;
            parts.pop();
            updateRocketMassProperties();
        }

        // Gesamten verfügbaren Treibstoff ermitteln
        function getTotalFuel() {
            return parts.reduce((sum, p) => sum + (p.fuel || 0), 0);
        }

        // Treibstoff verbrauchen (gleichmäßig über alle Tanks)
        function consumeFuel(amount) {
            let tanks = parts.filter(p => p.type === 'tank' && p.fuel > 0);
            if (tanks.length === 0) return false;
            let perTank = amount / tanks.length;
            tanks.forEach(t => t.fuel = Math.max(0, t.fuel - perTank));
            updateRocketMassProperties();
            return getTotalFuel() > 0;
        }

        // ---- PHYSIK UPDATE ----
        function updatePhysics(dt) {
            if (mode !== 'flight') return;
            // Steuerung auswerten
            let rotDir = 0;
            if (leftPressed) rotDir -= 1;
            if (rightPressed) rotDir += 1;
            const ROT_SPEED = 3.5; // rad/s
            rocket.angularVel = rotDir * ROT_SPEED;
            rocket.angle += rocket.angularVel * dt;

            // Schub
            let thrustActive = thrustPressed && getTotalFuel() > 0;
            let currentThrust = thrustActive ? throttle * THRUST_FORCE : 0;

            // Schubrichtung (Raketenachse: Nase oben = Winkel 0 -> Vektor (0, -1) )
            let thrustDirX = Math.sin(rocket.angle);   // weil 0° = oben -> x=0, y=-1
            let thrustDirY = -Math.cos(rocket.angle);

            // Position des Triebwerks relativ zum Schwerpunkt (letztes Teil = engine)
            let enginePart = parts[parts.length-1];
            if (enginePart && enginePart.type === 'engine') {
                // Hebelarm: Vektor vom Schwerpunkt zur Triebwerksdüse (Mittelpunkt des Triebwerks)
                let engineLocalY = enginePart._localY + enginePart._height/2;
                let leverX = 0; // alle Teile auf der Mittelachse
                let leverY = engineLocalY; // y-Richtung im lokalen System (unten positiv)
                // Drehmoment = Kreuzprodukt aus Hebelarm und Schubkraft
                // Im 2D: torque = leverX * forceY - leverY * forceX
                let forceX = thrustDirX * currentThrust;
                let forceY = thrustDirY * currentThrust;
                let torque = leverX * forceY - leverY * forceX;
                rocket.angularVel += (torque / rocket.inertia) * dt;
            }

            // Lineare Beschleunigung
            let ax = (thrustDirX * currentThrust) / rocket.totalMass;
            let ay = (thrustDirY * currentThrust) / rocket.totalMass + GRAVITY; // Gravitation nach unten
            rocket.vx += ax * dt;
            rocket.vy += ay * dt;

            // Reibung / Dämpfung (leicht)
            rocket.vx *= 0.998;
            rocket.vy *= 0.998;
            rocket.angularVel *= 0.98;

            // Position updaten
            rocket.x += rocket.vx * dt;
            rocket.y += rocket.vy * dt;

            // Treibstoffverbrauch
            if (thrustActive) {
                let fuelUse = throttle * FUEL_CONSUMPTION * dt;
                consumeFuel(fuelUse);
            }

            // Geschwindigkeitsanzeige
            let speed = Math.sqrt(rocket.vx*rocket.vx + rocket.vy*rocket.vy);
            speedDisplay.textContent = speed.toFixed(1) + ' m/s';
            let fuelPercent = (getTotalFuel() / 4.0) * 100; // max 4 Einheiten als Referenz
            fuelFill.style.width = Math.min(100, Math.max(0, fuelPercent)) + '%';
        }

        // ---- ZEICHNEN ----
        function drawStars() {
            for (let s of stars) {
                ctx.fillStyle = `rgba(255,255,200,${s.b})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function drawRocket() {
            if (parts.length === 0) return;
            ctx.save();
            ctx.translate(rocket.x, rocket.y);
            ctx.rotate(rocket.angle);

            // Zeichne Teile von oben nach unten
            for (let part of parts) {
                let y = part._localY;
                let h = part._height;
                let w = 16; // Breite
                ctx.fillStyle = part.type === 'pod' ? '#aaccff' :
                               part.type === 'tank' ? '#e0b040' : '#ff8844';
                ctx.fillRect(-w/2, y, w, h);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(-w/2, y, w, h);
                // Treibstoffanzeige im Tank
                if (part.type === 'tank' && part.fuel > 0) {
                    let fuelRatio = part.fuel / 4.0;
                    ctx.fillStyle = '#ffcc00';
                    ctx.fillRect(-w/2, y + h*(1-fuelRatio), w, h*fuelRatio);
                }
                // Triebwerksdüse
                if (part.type === 'engine') {
                    ctx.fillStyle = '#ff6600';
                    ctx.beginPath();
                    ctx.moveTo(-w/2-3, y+h);
                    ctx.lineTo(w/2+3, y+h);
                    ctx.lineTo(0, y+h+8);
                    ctx.closePath();
                    ctx.fill();
                }
            }
            ctx.restore();
        }

        function drawUI() {
            if (mode === 'build') {
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px "Segoe UI"';
                ctx.textAlign = 'center';
                ctx.fillText('BAUMODUS – Rakete zusammenstellen', 250, 80);
                // Zeichne die Rakete in der Mitte
                drawRocket();
            } else {
                drawRocket();
            }
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawStars();
            drawUI();
        }

        // ---- EVENT HANDLER ----
        function setMode(newMode) {
            mode = newMode;
            if (mode === 'build') {
                buildPanel.style.display = 'flex';
                flightPanel.style.display = 'none';
                rocket.vx = rocket.vy = 0;
                rocket.angularVel = 0;
                rocket.x = 250; rocket.y = 450;
                rocket.angle = 0;
            } else {
                buildPanel.style.display = 'none';
                flightPanel.style.display = 'flex';
                updateRocketMassProperties();
            }
        }

        // Touch/Click Events für Buttons
        document.getElementById('addTank').addEventListener('click', addTank);
        document.getElementById('addEngine').addEventListener('click', addEngine);
        document.getElementById('removePart').addEventListener('click', removeLastPart);
        document.getElementById('launchBtn').addEventListener('click', () => setMode('flight'));
        document.getElementById('backToBuild').addEventListener('click', () => setMode('build'));

        // Steuerung Flug
        let leftBtn = document.getElementById('leftBtn');
        let rightBtn = document.getElementById('rightBtn');
        let thrustBtn = document.getElementById('thrustBtn');

        function setButtonActive(btn, active) {
            if (active) btn.style.background = '#4a7ab5';
            else btn.style.background = '';
        }

        leftBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); leftPressed = true; setButtonActive(leftBtn, true); });
        leftBtn.addEventListener('pointerup', (e) => { e.preventDefault(); leftPressed = false; setButtonActive(leftBtn, false); });
        leftBtn.addEventListener('pointerleave', (e) => { leftPressed = false; setButtonActive(leftBtn, false); });

        rightBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); rightPressed = true; setButtonActive(rightBtn, true); });
        rightBtn.addEventListener('pointerup', (e) => { e.preventDefault(); rightPressed = false; setButtonActive(rightBtn, false); });
        rightBtn.addEventListener('pointerleave', (e) => { rightPressed = false; setButtonActive(rightBtn, false); });

        thrustBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); thrustPressed = true; thrustBtn.style.background = '#ff5500'; });
        thrustBtn.addEventListener('pointerup', (e) => { e.preventDefault(); thrustPressed = false; thrustBtn.style.background = ''; });
        thrustBtn.addEventListener('pointerleave', (e) => { thrustPressed = false; thrustBtn.style.background = ''; });

        throttleSlider.addEventListener('input', () => {
            throttle = parseInt(throttleSlider.value) / 100;
        });

        // Verhindert Zoom bei Doppeltipp auf Buttons
        document.querySelectorAll('button').forEach(b => {
            b.addEventListener('touchstart', (e) => e.preventDefault());
        });

        // Initialisierung
        updateRocketMassProperties();
        setMode('build');

        // Game Loop
        let lastTime = performance.now();
        function loop(now) {
            let dt = Math.min(0.05, (now - lastTime) / 1000);
            lastTime = now;
            updatePhysics(dt);
            render();
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    })();
</script>
</body>
</html>
