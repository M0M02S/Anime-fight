<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anime Fight Arena - Real Joystick</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0b1525 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            margin: 0;
            padding: 16px;
        }
        .game-container {
            background: #000000aa;
            border-radius: 64px;
            padding: 20px 20px 24px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
        }
        .canvas-wrapper {
            display: flex;
            justify-content: center;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            width: 100%;
            height: auto;
            background: radial-gradient(circle at 20% 40%, #2b3b4e, #141c28);
        }
        .health-bars {
            display: flex;
            justify-content: space-between;
            gap: 24px;
            margin: 16px 20px 20px 20px;
        }
        .health-bar-container {
            flex: 1;
            background: #2c1a1a;
            border-radius: 60px;
            padding: 4px;
            box-shadow: inset 0 2px 5px #00000055, 0 2px 3px rgba(255,255,255,0.2);
        }
        .health-fill {
            height: 24px;
            border-radius: 60px;
            width: 100%;
            transition: width 0.1s ease;
            background: linear-gradient(90deg, #e34d4d, #f08080);
        }
        .enemy-health .health-fill {
            background: linear-gradient(90deg, #c0392b, #e67e22);
        }
        .health-label {
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 2px black;
            margin-bottom: 6px;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
        }
        .controls-panel {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 68px;
            backdrop-filter: blur(8px);
        }
        /* Canvas joystick */
        .joystick-area {
            width: 130px;
            height: 130px;
            background: rgba(20, 15, 40, 0.9);
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6), inset 0 0 0 2px rgba(255,215,130,0.5);
            position: relative;
            touch-action: none;
        }
        #joystickCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: block;
        }
        .action-buttons {
            display: flex;
            gap: 24px;
        }
        .action-btn {
            background: radial-gradient(circle at 30% 30%, #e64b2e, #9b2c1d);
            border: 2px solid #ffc285;
            width: 85px;
            height: 85px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.9rem;
            font-weight: bold;
            color: #fff3cf;
            text-shadow: 0 2px 3px black;
            box-shadow: 0 8px 0 #541e12;
            transition: all 0.05s linear;
            cursor: pointer;
        }
        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #541e12;
        }
        .reset-btn {
            background: #2c3e66;
            box-shadow: 0 8px 0 #141c32;
        }
        .fight-tip {
            color: #ffd966;
            text-align: center;
            font-size: 0.8rem;
            margin-top: 12px;
            background: #00000077;
            border-radius: 60px;
            padding: 6px 12px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        @media (max-width: 780px) {
            .joystick-area { width: 110px; height: 110px; }
            .action-btn { width: 75px; height: 75px; font-size: 1.5rem; }
            .health-fill { height: 18px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="900" height="500" style="width:100%; height:auto; max-width:900px; aspect-ratio:900/500"></canvas>
        </div>
        <div class="health-bars">
            <div class="health-bar-container">
                <div class="health-label"><span>🔥 HERO</span> <span id="playerHpText">100</span></div>
                <div class="health-fill" id="playerHealthFill" style="width: 100%"></div>
            </div>
            <div class="health-bar-container enemy-health">
                <div class="health-label"><span>💀 AKUMA</span> <span id="enemyHpText">100</span></div>
                <div class="health-fill" id="enemyHealthFill" style="width: 100%"></div>
            </div>
        </div>
        <div class="controls-panel">
            <div class="joystick-area" id="joystickArea">
                <canvas id="joystickCanvas" width="130" height="130"></canvas>
            </div>
            <div class="action-buttons">
                <div class="action-btn" id="btnPunch">✧ PUNCH</div>
                <div class="action-btn" id="btnKick">⚡ KICK</div>
                <div class="action-btn reset-btn" id="btnReset">🔄</div>
            </div>
        </div>
        <div class="fight-tip">
            🕹️ DRAG JOYSTICK → MOVE | ⬆️ FLICK UP = JUMP | ⬇️ HOLD DOWN = BLOCK
        </div>
    </div>
</div>

<script>
    (function(){
        // ----- CANVAS -----
        const gameCanvas = document.getElementById('gameCanvas');
        const ctx = gameCanvas.getContext('2d');
        
        // ----- GAME DIMENSIONS -----
        const GROUND_Y = 420;
        const W = 48, H = 78;
        
        let gameRunning = true;
        let winner = null;
        
        // ----- PLAYER -----
        let player = {
            x: 130, y: GROUND_Y - H, vx: 0, vy: 0,
            width: W, height: H, facingRight: true,
            health: 100, maxHealth: 100, grounded: true,
            state: "idle", attackTimer: 0, hitTimer: 0, blockActive: false,
            invincibleTimer: 0, attackCooldown: 0
        };
        
        // ----- ENEMY -----
        let enemy = {
            x: gameCanvas.width - 150, y: GROUND_Y - H, vx: 0, vy: 0,
            width: W, height: H, facingRight: false,
            health: 100, maxHealth: 100, grounded: true,
            state: "idle", attackTimer: 0, hitTimer: 0, blockActive: false,
            invincibleTimer: 0, attackCooldown: 0
        };
        
        function updateHealthBars() {
            const playerPercent = (player.health / player.maxHealth) * 100;
            const enemyPercent = (enemy.health / enemy.maxHealth) * 100;
            document.getElementById('playerHealthFill').style.width = `${Math.max(0, playerPercent)}%`;
            document.getElementById('enemyHealthFill').style.width = `${Math.max(0, enemyPercent)}%`;
            document.getElementById('playerHpText').innerText = Math.floor(player.health);
            document.getElementById('enemyHpText').innerText = Math.floor(enemy.health);
        }
        
        function resetGame() {
            gameRunning = true;
            winner = null;
            player = {
                ...player,
                x: 130, y: GROUND_Y - H, vx: 0, vy: 0, facingRight: true,
                health: 100, maxHealth: 100, grounded: true, state: "idle",
                attackTimer: 0, hitTimer: 0, blockActive: false, invincibleTimer: 0, attackCooldown: 0
            };
            enemy = {
                ...enemy,
                x: gameCanvas.width - 150, y: GROUND_Y - H, vx: 0, vy: 0, facingRight: false,
                health: 100, maxHealth: 100, grounded: true, state: "idle",
                attackTimer: 0, hitTimer: 0, blockActive: false, invincibleTimer: 0, attackCooldown: 0
            };
            updateHealthBars();
        }
        
        // ----- JOYSTICK (canvas based) -----
        const joystickArea = document.getElementById('joystickArea');
        const joyCanvas = document.getElementById('joystickCanvas');
        const joyCtx = joyCanvas.getContext('2d');
        let joyActive = false;
        let joyPos = { x: 0, y: 0 }; // normalized -1..1
        let joyRadius = 50; // half of canvas size
        let joyCenterX = 65, joyCenterY = 65; // center of 130px canvas
        
        function drawJoystick() {
            joyCtx.clearRect(0, 0, 130, 130);
            joyCtx.beginPath();
            joyCtx.arc(joyCenterX, joyCenterY, joyRadius, 0, Math.PI*2);
            joyCtx.fillStyle = "#2a2540";
            joyCtx.fill();
            joyCtx.strokeStyle = "#ffda88";
            joyCtx.lineWidth = 2;
            joyCtx.stroke();
            // thumb position based on joyPos
            let thumbX = joyCenterX + joyPos.x * (joyRadius - 15);
            let thumbY = joyCenterY + joyPos.y * (joyRadius - 15);
            joyCtx.beginPath();
            joyCtx.arc(thumbX, thumbY, 20, 0, Math.PI*2);
            joyCtx.fillStyle = "#fad47c";
            joyCtx.fill();
            joyCtx.shadowBlur = 0;
        }
        
        function handleJoyStart(e) {
            e.preventDefault();
            joyActive = true;
            handleJoyMove(e);
        }
        
        function handleJoyMove(e) {
            if (!joyActive) return;
            e.preventDefault();
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const rect = joystickArea.getBoundingClientRect();
            const areaCenterX = rect.left + rect.width/2;
            const areaCenterY = rect.top + rect.height/2;
            let dx = clientX - areaCenterX;
            let dy = clientY - areaCenterY;
            const maxDist = rect.width/2;
            let dist = Math.hypot(dx, dy);
            if (dist > maxDist) {
                dx = dx / dist * maxDist;
                dy = dy / dist * maxDist;
                dist = maxDist;
            }
            joyPos.x = dx / maxDist;
            joyPos.y = dy / maxDist;
            drawJoystick();
        }
        
        function handleJoyEnd(e) {
            joyActive = false;
            joyPos = { x: 0, y: 0 };
            drawJoystick();
        }
        
        joystickArea.addEventListener('touchstart', handleJoyStart);
        joystickArea.addEventListener('touchmove', handleJoyMove);
        joystickArea.addEventListener('touchend', handleJoyEnd);
        joystickArea.addEventListener('mousedown', handleJoyStart);
        window.addEventListener('mousemove', (e) => { if (joyActive) handleJoyMove(e); });
        window.addEventListener('mouseup', handleJoyEnd);
        drawJoystick();
        
        // ----- GAME MECHANICS -----
        function applyDamage(target, amount, isBlocking) {
            if (target.invincibleTimer > 0) return false;
            let final = amount;
            if (isBlocking && target.blockActive) final = Math.floor(amount * 0.4);
            target.health = Math.max(0, target.health - final);
            target.invincibleTimer = 0.45;
            target.hitTimer = 0.25;
            target.state = "hit";
            if (target === player) player.vx += (player.facingRight ? -3 : 3);
            else enemy.vx += (enemy.facingRight ? -2 : 2);
            updateHealthBars();
            if (target.health <= 0) {
                gameRunning = false;
                winner = (target === player) ? "enemy" : "player";
            }
            return true;
        }
        
        function performAttack(attacker, defender, damage, rangeFront) {
            if (!gameRunning) return false;
            if (attacker.attackCooldown > 0) return false;
            if (attacker.state === "hit") return false;
            const ac = attacker.x + attacker.width/2;
            const dc = defender.x + defender.width/2;
            const dist = Math.abs(ac - dc);
            const facingOk = (attacker.facingRight && dc > ac) || (!attacker.facingRight && dc < ac);
            if (dist <= rangeFront + 20 && facingOk) {
                const blocking = defender.blockActive && defender.state !== "hit";
                applyDamage(defender, damage, blocking);
                attacker.attackCooldown = 0.55;
                return true;
            }
            return false;
        }
        
        function startPlayerAttack(type) {
            if (!gameRunning) return;
            if (player.attackCooldown > 0) return;
            if (player.state === "hit") return;
            let damage = type === 'punch' ? 9 : 14;
            let range = type === 'punch' ? 52 : 60;
            player.state = type;
            player.attackTimer = 0.28;
            performAttack(player, enemy, damage, range);
            player.attackCooldown = 0.55;
        }
        
        function aiAttack() {
            if (!gameRunning) return;
            if (enemy.attackCooldown > 0) return;
            if (enemy.state === "hit") return;
            const distToPlayer = Math.abs((enemy.x + enemy.width/2) - (player.x + player.width/2));
            if (distToPlayer < 90) {
                let type = Math.random() < 0.6 ? 'punch' : 'kick';
                let damage = type === 'punch' ? 8 : 13;
                let range = 58;
                enemy.state = type;
                enemy.attackTimer = 0.28;
                performAttack(enemy, player, damage, range);
                enemy.attackCooldown = 0.65;
            }
        }
        
        // ----- INPUT FROM JOYSTICK -----
        let moveLeft = false, moveRight = false;
        let jumpRequest = false;
        let blockRequest = false;
        let lastUp = false;
        
        function updateJoystickActions() {
            const dead = 0.2;
            const x = Math.abs(joyPos.x) > dead ? joyPos.x : 0;
            moveLeft = x < -0.2;
            moveRight = x > 0.2;
            const up = joyPos.y < -0.6;
            const down = joyPos.y > 0.6;
            // Jump on rising edge of up
            if (up && !lastUp) jumpRequest = true;
            else jumpRequest = false;
            lastUp = up;
            blockRequest = down;
        }
        
        // ----- PHYSICS -----
        let lastTime = 0;
        let delta = 1/60;
        
        function updateMovement(dt) {
            if (!gameRunning) return;
            let canMove = (player.attackTimer <= 0 && player.hitTimer <= 0);
            if (canMove) {
                let acc = 0;
                if (moveLeft) acc = -1;
                if (moveRight) acc = 1;
                player.vx += acc * 14 * dt;
                player.vx *= 0.92;
                if (Math.abs(player.vx) < 0.2) player.vx = 0;
                player.vx = Math.min(320, Math.max(-320, player.vx));
                player.x += player.vx * dt;
            } else {
                player.vx *= 0.96;
                player.x += player.vx * dt;
            }
            // Jump
            if (jumpRequest && player.grounded && canMove && player.attackTimer === 0 && player.hitTimer === 0) {
                player.vy = -370;
                player.grounded = false;
                player.state = "jump";
            }
            player.vy += 1200 * dt;
            player.y += player.vy * dt;
            if (player.y >= GROUND_Y - H) {
                player.y = GROUND_Y - H;
                player.vy = 0;
                player.grounded = true;
                if (player.state === "jump" && player.attackTimer === 0 && player.hitTimer === 0) player.state = "idle";
            } else player.grounded = false;
            player.x = Math.min(gameCanvas.width - player.width - 25, Math.max(30, player.x));
            // Enemy AI movement (always tries to approach)
            let aiMove = (enemy.attackTimer <= 0 && enemy.hitTimer <= 0);
            if (aiMove && gameRunning) {
                let diff = player.x - enemy.x;
                let dir = 0;
                if (Math.abs(diff) > 20) dir = diff > 0 ? 1 : -1;
                enemy.vx += dir * 9 * dt;
                enemy.vx *= 0.92;
                enemy.x += enemy.vx * dt;
                enemy.x = Math.min(gameCanvas.width - enemy.width - 20, Math.max(40, enemy.x));
                if (player.x + player.width/2 > enemy.x + enemy.width/2) enemy.facingRight = true;
                else enemy.facingRight = false;
            } else {
                enemy.vx *= 0.96;
                enemy.x += enemy.vx * dt;
                enemy.x = Math.min(gameCanvas.width - enemy.width - 20, Math.max(40, enemy.x));
            }
            enemy.vy += 1200 * dt;
            enemy.y += enemy.vy * dt;
            if (enemy.y >= GROUND_Y - H) {
                enemy.y = GROUND_Y - H;
                enemy.vy = 0;
                enemy.grounded = true;
            } else enemy.grounded = false;
        }
        
        function updateTimers(dt) {
            if (!gameRunning) return;
            // player timers
            if (player.attackTimer > 0) { player.attackTimer -= dt; if (player.attackTimer <= 0 && player.state !== "hit") player.state = "idle"; }
            if (player.hitTimer > 0) { player.hitTimer -= dt; if (player.hitTimer <= 0 && player.state === "hit") player.state = "idle"; }
            if (player.attackCooldown > 0) player.attackCooldown -= dt;
            if (player.invincibleTimer > 0) player.invincibleTimer -= dt;
            // enemy timers
            if (enemy.attackTimer > 0) { enemy.attackTimer -= dt; if (enemy.attackTimer <= 0 && enemy.state !== "hit") enemy.state = "idle"; }
            if (enemy.hitTimer > 0) { enemy.hitTimer -= dt; if (enemy.hitTimer <= 0 && enemy.state === "hit") enemy.state = "idle"; }
            if (enemy.attackCooldown > 0) enemy.attackCooldown -= dt;
            if (enemy.invincibleTimer > 0) enemy.invincibleTimer -= dt;
            
            // AI attack decision
            if (gameRunning && enemy.attackTimer <= 0 && enemy.hitTimer <= 0 && enemy.attackCooldown <= 0) {
                const dist = Math.abs((player.x + player.width/2) - (enemy.x + enemy.width/2));
                if (dist < 100 && Math.random() < 0.022) aiAttack();
            }
            // Block handling
            if (player.state === "hit" || player.attackTimer > 0) player.blockActive = false;
            else player.blockActive = blockRequest;
            if (player.blockActive && player.state !== "hit" && player.attackTimer <= 0) player.state = "block";
            else if (player.state === "block" && !player.blockActive && player.attackTimer === 0 && player.hitTimer === 0) player.state = "idle";
            
            if (player.state !== "block" && player.state !== "hit" && player.attackTimer <= 0 && player.hitTimer <= 0 && player.grounded && player.state !== "jump") player.state = "idle";
            if (enemy.state !== "hit" && enemy.attackTimer <= 0 && enemy.hitTimer <= 0 && enemy.grounded) enemy.state = "idle";
        }
        
        // ----- DRAWING -----
        function drawFighter(x, y, isPlayer, state, facingRight, blockFlag) {
            const w = W, h = H;
            ctx.save();
            if (!facingRight) {
                ctx.translate(x + w/2, y + h/2);
                ctx.scale(-1, 1);
                ctx.translate(-x - w/2, -y - h/2);
            }
            ctx.fillStyle = isPlayer ? "#ffc7a2" : "#b77b55";
            ctx.beginPath();
            ctx.ellipse(x + w/2, y + h*0.35, w*0.38, h*0.35, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = isPlayer ? "#f0a56e" : "#9a5a3a";
            ctx.fillRect(x + w*0.2, y + h*0.55, w*0.6, h*0.35);
            ctx.fillStyle = "#2c2c54";
            ctx.fillRect(x + w*0.2, y + h*0.75, w*0.6, h*0.2);
            ctx.fillStyle = isPlayer ? "#3b2b1f" : "#2f1e0f";
            ctx.beginPath();
            ctx.moveTo(x + w*0.2, y + h*0.2);
            ctx.quadraticCurveTo(x + w/2, y - h*0.1, x + w*0.8, y + h*0.2);
            ctx.fill();
            ctx.fillStyle = "#1f1a17";
            ctx.beginPath();
            ctx.arc(x + w*0.35, y + h*0.38, 6, 0, Math.PI*2);
            ctx.arc(x + w*0.65, y + h*0.38, 6, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(x + w*0.32, y + h*0.36, 2.2, 0, Math.PI*2);
            ctx.arc(x + w*0.62, y + h*0.36, 2.2, 0, Math.PI*2);
            ctx.fill();
            if (state === "punch" || state === "kick") {
                ctx.fillStyle = "#d64531";
                ctx.beginPath();
                ctx.moveTo(x + w*0.5, y + h*0.55);
                ctx.lineTo(x + w*0.7, y + h*0.65);
                ctx.lineTo(x + w*0.5, y + h*0.62);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(x + w*0.85, y + h*0.5);
                ctx.lineTo(x + w + 12, y + h*0.45);
                ctx.lineWidth = 3;
                ctx.strokeStyle = "#ffaa55";
                ctx.stroke();
            }
            if (state === "hit") {
                ctx.fillStyle = "#ff4444";
                ctx.font = "bold 22px monospace";
                ctx.fillText("!!", x + w*0.4, y - 8);
            }
            if (blockFlag && state === "block") {
                ctx.fillStyle = "#77aaff66";
                ctx.fillRect(x + w*0.2, y + h*0.3, w*0.6, h*0.3);
            }
            ctx.restore();
        }
        
        function draw() {
            ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
            ctx.fillStyle = "#a0c4e288";
            for(let i=0;i<12;i++) ctx.fillRect(40 + i*70, GROUND_Y+5, 25, 8);
            drawFighter(player.x, player.y, true, player.state, player.facingRight, player.blockActive);
            drawFighter(enemy.x, enemy.y, false, enemy.state, enemy.facingRight, enemy.blockActive);
            if (!gameRunning && winner) {
                ctx.font = "bold 34 'Segoe UI'";
                ctx.fillStyle = "#FFD966";
                ctx.shadowBlur = 6;
                ctx.fillText(winner === "player" ? "⭐ VICTORY! ⭐" : "💀 YOU LOSE 💀", gameCanvas.width/2-140, 70);
                ctx.font = "18px monospace";
                ctx.fillStyle = "white";
                ctx.fillText("tap RESET to battle again", gameCanvas.width/2-120, 125);
            }
        }
        
        // ----- GAME LOOP -----
        function gameLoop(now) {
            requestAnimationFrame(gameLoop);
            if (!lastTime) { lastTime = now; return; }
            let dt = Math.min(0.033, (now - lastTime) / 1000);
            if (dt <= 0) { lastTime = now; return; }
            delta = dt;
            lastTime = now;
            updateJoystickActions();
            if (gameRunning) {
                updateMovement(delta);
                updateTimers(delta);
                if (player.health <= 0) { gameRunning = false; winner = "enemy"; updateHealthBars(); }
                if (enemy.health <= 0) { gameRunning = false; winner = "player"; updateHealthBars(); }
            }
            draw();
        }
        
        // ----- BUTTONS -----
        document.getElementById('btnPunch').addEventListener('click', (e) => { e.preventDefault(); startPlayerAttack('punch'); });
        document.getElementById('btnKick').addEventListener('click', (e) => { e.preventDefault(); startPlayerAttack('kick'); });
        document.getElementById('btnReset').addEventListener('click', (e) => { e.preventDefault(); resetGame(); });
        
        resetGame();
        requestAnimationFrame(gameLoop);
        gameCanvas.addEventListener('contextmenu', (e) => e.preventDefault());
    })();
</script>
</body>
</html>
