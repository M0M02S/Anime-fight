<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🚀 Raketenbauer – Spaceflight Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: manipulation;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            max-width: 500px;
            max-height: 900px;
            background: #03080f;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 140, 255, 0.25);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .overlay {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        /* ── BUILD UI ── */
        .stats-top {
            position: absolute;
            top: 10px;
            left: 12px;
            right: 12px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            pointer-events: auto;
            z-index: 11;
        }
        .stat-badge {
            background: rgba(10, 18, 35, 0.9);
            backdrop-filter: blur(8px);
            color: #e0e8ff;
            padding: 7px 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
            letter-spacing: 0.4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            white-space: nowrap;
        }
        .stat-badge span {
            color: #ffb840;
        }
        .launch-btn-wrap {
            position: absolute;
            bottom: 230px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: auto;
            z-index: 11;
        }
        .launch-btn {
            background: #1a8a3a;
            color: #fff;
            border: none;
            border-radius: 32px;
            padding: 16px 50px;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 6px 24px rgba(0, 210, 70, 0.5);
            cursor: pointer;
            transition: all 0.15s;
        }
        .launch-btn:active {
            background: #2ab84a;
            transform: scale(0.94);
        }
        .parts-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 210px;
            background: rgba(12, 20, 38, 0.95);
            backdrop-filter: blur(14px);
            border-top: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            pointer-events: auto;
            z-index: 11;
            border-radius: 20px 20px 0 0;
        }
        .category-tabs {
            display: flex;
            gap: 4px;
            padding: 8px 10px 4px 10px;
            overflow-x: auto;
            flex-shrink: 0;
        }
        .cat-btn {
            background: rgba(40, 55, 85, 0.8);
            color: #ccd;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.12s;
        }
        .cat-btn.active {
            background: #2a5588;
            color: #fff;
            border-color: #5aa0e0;
            box-shadow: 0 0 14px rgba(70, 150, 255, 0.5);
        }
        .parts-grid {
            display: flex;
            gap: 10px;
            padding: 8px 12px;
            flex-wrap: wrap;
            overflow-y: auto;
            flex: 1;
            align-content: flex-start;
        }
        .part-card {
            background: rgba(35, 50, 75, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 14px;
            width: 100px;
            height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            gap: 4px;
            flex-shrink: 0;
        }
        .part-card:active {
            background: #3a6090;
            border-color: #80c0ff;
            transform: scale(0.94);
        }
        .part-card .icon {
            font-size: 32px;
        }
        .part-card .name {
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            line-height: 1.2;
        }
        .part-card .stat {
            color: #bbb;
            font-size: 9px;
        }
        .remove-hint {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 10px;
            text-align: center;
            z-index: 5;
        }
        /* ── FLIGHT UI ── */
        .flight-hud {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: none;
            width: 90%;
            max-width: 400px;
            z-index: 11;
        }
        .hud-box {
            display: flex;
            gap: 10px;
            align-items: center;
            pointer-events: auto;
            background: rgba(10, 16, 32, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 18px;
            padding: 8px 14px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            flex-wrap: wrap;
            justify-content: center;
        }
        .hud-box button {
            pointer-events: auto;
            background: #1e3050;
            color: #fff;
            border: none;
            border-radius: 28px;
            padding: 12px 18px;
            font-size: 17px;
            font-weight: bold;
            min-width: 50px;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0, 140, 255, 0.3);
            transition: all 0.1s;
        }
        .hud-box button:active {
            background: #3a6aaa;
            transform: scale(0.93);
        }
        .thrust-big {
            background: #d94f1a !important;
            font-size: 22px !important;
            padding: 15px 38px !important;
            letter-spacing: 3px;
            animation: pulse 1.6s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 12px #ff6600;
            }
            50% {
                box-shadow: 0 0 28px #ffaa00, 0 0 50px #ff4400;
            }
        }
        .slider-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 80px;
        }
        .slider-row input[type=range] {
            flex: 1;
            height: 6px;
            accent-color: #ff7700;
        }
        .hud-info {
            color: #fff;
            font-weight: bold;
            font-size: 12px;
            text-shadow: 0 0 8px #000;
            background: rgba(0, 0, 0, 0.55);
            padding: 4px 10px;
            border-radius: 12px;
            white-space: nowrap;
        }
        .fuel-mini {
            width: 70px;
            height: 7px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
        }
        .fuel-mini div {
            height: 100%;
            background: #f5b800;
            border-radius: 3px;
            transition: width 0.15s;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="gameCanvas" width="500" height="900"></canvas>
        <div class="overlay" id="overlay"></div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const overlay = document.getElementById('overlay');

            // ═══════════════ STATE ═══════════════
            let mode = 'build'; // 'build' | 'flight'
            let parts = []; // Rocket parts (top to bottom)
            // Default capsule always present
            const CAPSULE = { type: 'pod', name: 'Kapsel', mass: 2.0, fuel: 0, thrust: 0, color: '#b8d4ff', width: 28,
                height: 30 };
            parts.push({ ...CAPSULE });

            // Part definitions for shop
            const PART_SHOP = {
                tanks: [
                    { type: 'tank', name: 'Kleiner Tank', mass: 0.8, fuel: 3.0, thrust: 0, color: '#e0a030',
                        width: 28, height: 34, icon: '🛢️' },
                    { type: 'tank', name: 'Mittlerer Tank', mass: 1.5, fuel: 6.0, thrust: 0, color: '#e0a030',
                        width: 30, height: 42, icon: '🛢️' },
                    { type: 'tank', name: 'Großer Tank', mass: 2.5, fuel: 10.0, thrust: 0, color: '#e0a030',
                        width: 32, height: 50, icon: '🛢️' },
                ],
                engines: [
                    { type: 'engine', name: 'Basis Triebwerk', mass: 2.0, fuel: 0, thrust: 250, color: '#ff6630',
                        width: 30, height: 26, icon: '🚀' },
                    { type: 'engine', name: 'Starkes Triebwerk', mass: 3.5, fuel: 0, thrust: 450,
                        color: '#ff4420', width: 34, height: 30, icon: '🚀' },
                ],
                utility: [
                    { type: 'utility', name: 'Seitentank', mass: 0.6, fuel: 2.0, thrust: 0, color: '#c09040',
                        width: 14, height: 28, icon: '📦' },
                    { type: 'utility', name: 'Stabilisator', mass: 0.4, fuel: 0, thrust: 0, color: '#8899aa',
                        width: 20, height: 12, icon: '📏' },
                ],
            };

            let selectedCategory = 'tanks'; // current shop tab

            // Physics state
            const WORLD_GROUND_Y = 780;
            let rocket = {
                worldX: 250,
                worldY: 745,
                vx: 0,
                vy: 0,
                angle: 0,
                angularVel: 0,
                totalMass: 2.0,
                inertia: 0.5,
                comFromTop: 15,
            };

            const GRAVITY = 18;
            const FUEL_BURN_RATE = 65;

            // Flight inputs
            let leftHeld = false;
            let rightHeld = false;
            let thrustHeld = false;
            let throttle = 0.75;

            // Build mode: stored bounding boxes of drawn parts for tap-to-remove
            let buildPartBounds = []; // { index, x, y, w, h }

            // Stars
            let stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 2 + 0.3,
                    b: Math.random() * 0.7 + 0.3,
                    phase: Math.random() * Math.PI * 2,
                });
            }

            // ═══════════════ HELPERS ═══════════════
            function getPartHeight(p) { return p.height || 30; }

            function getPartWidth(p) { return p.width || 28; }

            function getTotalFuel() { return parts.reduce((s, p) => s + (p.fuel || 0), 0); }

            function getTotalThrust() { return parts.reduce((s, p) => s + (p.thrust || 0), 0); }

            function getTotalMass() { return parts.reduce((s, p) => s + (p.mass || 0) + (p.fuel || 0), 0); }

            function hasEngine() { return parts.some(p => p.type === 'engine'); }

            function updateMassProperties() {
                if (parts.length === 0) return;
                let totalMass = getTotalMass();
                let momentSum = 0;
                let curY = 0;
                for (let p of parts) {
                    let pm = (p.mass || 0) + (p.fuel || 0);
                    let ph = getPartHeight(p);
                    momentSum += pm * (curY + ph / 2);
                    curY += ph;
                }
                let com = momentSum / Math.max(totalMass, 0.01);
                curY = 0;
                for (let p of parts) {
                    let ph = getPartHeight(p);
                    p._localY = curY - com;
                    p._height = ph;
                    p._width = getPartWidth(p);
                    curY += ph;
                }
                let inertia = 0;
                curY = 0;
                for (let p of parts) {
                    let pm = (p.mass || 0) + (p.fuel || 0);
                    let pc = curY + getPartHeight(p) / 2;
                    let d = pc - com;
                    inertia += pm * d * d;
                    curY += getPartHeight(p);
                }
                rocket.totalMass = Math.max(totalMass, 0.3);
                rocket.inertia = Math.max(inertia, 0.04);
                rocket.comFromTop = com;
            }

            function consumeFuel(amount) {
                let tanks = parts.filter(p => p.type === 'tank' && p.fuel > 0);
                if (tanks.length === 0) return false;
                let per = amount / tanks.length;
                tanks.forEach(t => t.fuel = Math.max(0, t.fuel - per));
                updateMassProperties();
                return getTotalFuel() > 0.001;
            }

            // ═══════════════ BUILDING ═══════════════
            function addPart(partDef) {
                let newPart = { ...partDef, fuel: partDef.fuel || 0 };
                if (partDef.type === 'engine') {
                    if (hasEngine()) {
                        // Replace engine
                        let engIdx = parts.findIndex(p => p.type === 'engine');
                        if (engIdx >= 0) parts.splice(engIdx, 1);
                    }
                    parts.push(newPart);
                } else if (partDef.type === 'tank' || partDef.type === 'utility') {
                    let engIdx = parts.findIndex(p => p.type === 'engine');
                    if (engIdx >= 0) parts.splice(engIdx, 0, newPart);
                    else parts.push(newPart);
                }
                updateMassProperties();
                renderOverlay();
            }

            function removePartAt(index) {
                if (index < 0 || index >= parts.length) return;
                if (parts[index].type === 'pod') return; // keep capsule
                parts.splice(index, 1);
                updateMassProperties();
                renderOverlay();
            }

            function removeLastAddable() {
                // Remove last non-pod part
                for (let i = parts.length - 1; i >= 0; i--) {
                    if (parts[i].type !== 'pod') {
                        removePartAt(i);
                        return;
                    }
                }
            }

            // ═══════════════ RENDER OVERLAY ═══════════════
            function renderOverlay() {
                if (mode === 'build') renderBuildOverlay();
                else renderFlightOverlay();
            }

            function renderBuildOverlay() {
                let mass = getTotalMass().toFixed(1);
                let thrust = getTotalThrust().toFixed(0);
                let twr = (getTotalThrust() / Math.max(getTotalMass() * 9.81, 0.01)).toFixed(2);
                let fuel = getTotalFuel().toFixed(1);

                let catTabs = ['tanks', 'engines', 'utility'];
                let catNames = { tanks: '⛽ Tanks', engines: '🚀 Triebwerke', utility: '🔧 Utility' };
                let tabHTML = catTabs.map(c =>
                    `<button class="cat-btn${selectedCategory === c ? ' active' : ''}" data-cat="${c}">${catNames[c]}</button>`
                ).join('');

                let partsHTML = '';
                let shopItems = PART_SHOP[selectedCategory] || [];
                shopItems.forEach((p, i) => {
                    let info = '';
                    if (p.fuel > 0) info = `Treibstoff: ${p.fuel}`;
                    if (p.thrust > 0) info = `Schub: ${p.thrust}`;
                    partsHTML += `
                <div class="part-card" data-part-index="${i}" data-cat="${selectedCategory}">
                  <span class="icon">${p.icon || '🔹'}</span>
                  <span class="name">${p.name}</span>
                  <span class="stat">${info}</span>
                </div>`;
                });

                overlay.innerHTML = `
              <div class="stats-top">
                <div class="stat-badge">Masse: <span>${mass}t</span></div>
                <div class="stat-badge">Schub: <span>${thrust}t</span></div>
                <div class="stat-badge">TWR: <span>${twr}</span></div>
                <div class="stat-badge">Treibstoff: <span>${fuel}</span></div>
              </div>
              <div class="remove-hint">👆 Auf Raketenteil tippen zum Entfernen</div>
              <div class="launch-btn-wrap">
                <button class="launch-btn" id="btnLaunchBuild">🚀 START</button>
              </div>
              <div class="parts-panel">
                <div class="category-tabs">${tabHTML}</div>
                <div class="parts-grid" id="partsGrid">${partsHTML}</div>
              </div>`;

                // Attach events
                setTimeout(() => {
                    // Category buttons
                    overlay.querySelectorAll('.cat-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            selectedCategory = btn.dataset.cat;
                            renderOverlay();
                        });
                    });
                    // Part cards
                    overlay.querySelectorAll('.part-card').forEach(card => {
                        card.addEventListener('click', (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            let cat = card.dataset.cat;
                            let idx = parseInt(card.dataset.partIndex);
                            let shopItems = PART_SHOP[cat];
                            if (shopItems && shopItems[idx]) {
                                addPart(shopItems[idx]);
                            }
                        });
                    });
                    // Launch button
                    let lb = document.getElementById('btnLaunchBuild');
                    if (lb) {
                        lb.addEventListener('click', (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            if (!hasEngine()) {
                                alert('⚠️ Baue zuerst ein Triebwerk ein!');
                                return;
                            }
                            setMode('flight');
                        });
                    }
                }, 30);
            }

            function renderFlightOverlay() {
                overlay.innerHTML = `
              <div class="flight-hud">
                <div class="hud-box" style="gap:14px;">
                  <span class="hud-info" id="speedBadge">0.0 m/s</span>
                  <span class="hud-info" id="altBadge">0 m</span>
                  <div class="fuel-mini"><div id="fuelFill" style="width:100%;"></div></div>
                </div>
                <div class="hud-box">
                  <button id="btnLeft">◀</button>
                  <div class="slider-row">
                    <span style="color:#fff;font-size:10px;">Schub</span>
                    <input type="range" id="throttleSlider" min="0" max="100" value="75">
                  </div>
                  <button id="btnRight">▶</button>
                </div>
                <button class="thrust-big" id="btnThrust">🔥 SCHUB</button>
                <button id="btnBack" style="background:#444;font-size:13px;padding:8px 20px;">🔧 Bauen</button>
              </div>`;

                setTimeout(() => {
                    let bl = document.getElementById('btnLeft');
                    let br = document.getElementById('btnRight');
                    let bt = document.getElementById('btnThrust');
                    let bs = document.getElementById('throttleSlider');
                    let bb = document.getElementById('btnBack');

                    function setActive(btn, active) {
                        if (btn) btn.style.background = active ? '#4a80c0' : '';
                    }
                    if (bl) {
                        bl.addEventListener('pointerdown', e => { e.preventDefault();
                            leftHeld = true;
                            setActive(bl, true); });
                        bl.addEventListener('pointerup', e => { e.preventDefault();
                            leftHeld = false;
                            setActive(bl, false); });
                        bl.addEventListener('pointerleave', () => { leftHeld = false;
                            setActive(bl, false); });
                    }
                    if (br) {
                        br.addEventListener('pointerdown', e => { e.preventDefault();
                            rightHeld = true;
                            setActive(br, true); });
                        br.addEventListener('pointerup', e => { e.preventDefault();
                            rightHeld = false;
                            setActive(br, false); });
                        br.addEventListener('pointerleave', () => { rightHeld = false;
                            setActive(br, false); });
                    }
                    if (bt) {
                        bt.addEventListener('pointerdown', e => { e.preventDefault();
                            thrustHeld = true;
                            bt.style.background = '#ff4400'; });
                        bt.addEventListener('pointerup', e => { e.preventDefault();
                            thrustHeld = false;
                            bt.style.background = ''; });
                        bt.addEventListener('pointerleave', () => { thrustHeld = false;
                            bt.style.background = ''; });
                    }
                    if (bs) bs.addEventListener('input', () => { throttle = parseInt(bs.value) / 100; });
                    if (bb) bb.addEventListener('click', () => setMode('build'));
                }, 40);
            }

            // ═══════════════ MODE SWITCH ═══════════════
            function setMode(newMode) {
                mode = newMode;
                if (mode === 'build') {
                    rocket.worldX = 250;
                    rocket.worldY = 745;
                    rocket.vx = 0;
                    rocket.vy = 0;
                    rocket.angle = 0;
                    rocket.angularVel = 0;
                    updateMassProperties();
                } else {
                    updateMassProperties();
                    rocket.worldX = 250;
                    rocket.worldY = WORLD_GROUND_Y - 40;
                    rocket.vx = 0;
                    rocket.vy = 0;
                    rocket.angle = 0;
                    rocket.angularVel = 0;
                }
                renderOverlay();
            }

            // ═══════════════ CANVAS TAP (remove part) ═══════════════
            function getCanvasPos(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let cx, cy;
                if (e.touches && e.touches.length > 0) {
                    cx = (e.touches[0].clientX - rect.left) * scaleX;
                    cy = (e.touches[0].clientY - rect.top) * scaleY;
                } else if (e.changedTouches && e.changedTouches.length > 0) {
                    cx = (e.changedTouches[0].clientX - rect.left) * scaleX;
                    cy = (e.changedTouches[0].clientY - rect.top) * scaleY;
                } else {
                    cx = (e.clientX - rect.left) * scaleX;
                    cy = (e.clientY - rect.top) * scaleY;
                }
                return { x: Math.max(0, Math.min(canvas.width, cx)), y: Math.max(0, Math.min(canvas.height, cy)) };
            }

            canvas.addEventListener('pointerdown', (e) => {
                if (mode !== 'build') return;
                // Check if tap is on overlay area (bottom panel or top stats)
                const pos = getCanvasPos(e);
                // Rough check: if tap is in bottom 220px or top 50px, it's overlay territory
                if (pos.y > canvas.height - 220 || pos.y < 50) return;
                // Check against stored part bounds
                for (let b of buildPartBounds) {
                    if (pos.x >= b.x && pos.x <= b.x + b.w && pos.y >= b.y && pos.y <= b.y + b.h) {
                        if (parts[b.index] && parts[b.index].type !== 'pod') {
                            removePartAt(b.index);
                            return;
                        }
                    }
                }
            });

            // ═══════════════ PHYSICS ═══════════════
            function updateFlight(dt) {
                if (mode !== 'flight') return;
                let dtc = Math.min(dt, 0.05);

                let rotInput = 0;
                if (leftHeld) rotInput -= 1;
                if (rightHeld) rotInput += 1;
                rocket.angularVel = rotInput * 3.8;
                rocket.angle += rocket.angularVel * dtc;

                let hasFuel = getTotalFuel() > 0.001;
                let thrustActive = thrustHeld && hasFuel && hasEngine();
                let thrustForce = thrustActive ? throttle * getTotalThrust() : 0;

                let tx = Math.sin(rocket.angle);
                let ty = -Math.cos(rocket.angle);

                let engPart = parts[parts.length - 1];
                if (engPart && engPart.type === 'engine' && thrustForce > 0) {
                    let engineLocalY = engPart._localY + engPart._height / 2;
                    let torque = -engineLocalY * (tx * thrustForce);
                    rocket.angularVel += (torque / rocket.inertia) * dtc;
                }

                let ax = (tx * thrustForce) / rocket.totalMass;
                let ay = (ty * thrustForce) / rocket.totalMass + GRAVITY;
                rocket.vx += ax * dtc;
                rocket.vy += ay * dtc;

                rocket.vx *= 0.997;
                rocket.vy *= 0.997;
                rocket.angularVel *= 0.96;

                rocket.worldX += rocket.vx * dtc;
                rocket.worldY += rocket.vy * dtc;

                if (rocket.worldY >= WORLD_GROUND_Y - 5) {
                    rocket.worldY = WORLD_GROUND_Y - 5;
                    if (rocket.vy > 0) rocket.vy = 0;
                    rocket.vx *= 0.88;
                    rocket.angularVel *= 0.4;
                }
                if (rocket.worldY < -200) rocket.worldY = -200;
                if (rocket.worldX < -60) rocket.worldX = canvas.width + 50;
                if (rocket.worldX > canvas.width + 60) rocket.worldX = -50;

                if (thrustActive) consumeFuel(throttle * FUEL_BURN_RATE * dtc);

                // Update HUD
                let speed = Math.sqrt(rocket.vx ** 2 + rocket.vy ** 2);
                let alt = Math.max(0, WORLD_GROUND_Y - rocket.worldY);
                let speedBadge = document.getElementById('speedBadge');
                let altBadge = document.getElementById('altBadge');
                let fuelFill = document.getElementById('fuelFill');
                if (speedBadge) speedBadge.textContent = speed.toFixed(1) + ' m/s';
                if (altBadge) altBadge.textContent = alt.toFixed(0) + ' m';
                if (fuelFill) {
                    let maxFuel = parts.filter(p => p.type === 'tank').reduce((s, p) => s + (PART_SHOP.tanks.find(
                        t => t.name === p.name)?.fuel || 3), 3);
                    let fp = (getTotalFuel() / Math.max(maxFuel, 0.1)) * 100;
                    fuelFill.style.width = Math.min(100, Math.max(0, fp)) + '%';
                }
            }

            // ═══════════════ RENDERING ═══════════════
            function drawStars(alpha = 1) {
                for (let s of stars) {
                    let twinkle = Math.sin(Date.now() * 0.003 + s.phase) * 0.25 + 0.75;
                    ctx.fillStyle = `rgba(255,250,215,${s.b * twinkle * alpha})`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawGroundAndSky(alpha) {
                let gy = WORLD_GROUND_Y;
                // Sky
                let skyGrad = ctx.createLinearGradient(0, gy - 400, 0, 0);
                skyGrad.addColorStop(0, `rgba(90,160,210,${0.7*alpha})`);
                skyGrad.addColorStop(0.4, `rgba(40,80,150,${0.85*alpha})`);
                skyGrad.addColorStop(0.75, `rgba(12,22,55,1)`);
                skyGrad.addColorStop(1, '#050a1a');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, canvas.width, gy);

                // Ground
                let gGrad = ctx.createLinearGradient(0, gy - 20, 0, gy + 50);
                gGrad.addColorStop(0, '#6a9a3a');
                gGrad.addColorStop(0.3, '#4a7a20');
                gGrad.addColorStop(1, '#3a4020');
                ctx.fillStyle = gGrad;
                ctx.fillRect(0, gy - 8, canvas.width, canvas.height - gy + 8);

                ctx.strokeStyle = '#8cc34b';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(0, gy);
                for (let x = 0; x < canvas.width; x += 6) {
                    ctx.lineTo(x, gy - Math.sin(x * 0.4 + 1) * 4 - (x % 12 === 0 ? 3 : 0));
                }
                ctx.stroke();
            }

            function drawRocketAt(wx, wy, angle, alpha = 1) {
                if (parts.length === 0) return;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(wx, wy);
                ctx.rotate(angle);
                for (let p of parts) {
                    let ly = p._localY;
                    let h = p._height;
                    let w = p._width;
                    ctx.fillStyle = p.color || '#ccc';
                    ctx.fillRect(-w / 2, ly, w, h);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1.4;
                    ctx.strokeRect(-w / 2, ly, w, h);
                    if (p.type === 'tank' && p.fuel > 0) {
                        let maxF = PART_SHOP.tanks.find(t => t.name === p.name)?.fuel || 5;
                        let ratio = p.fuel / Math.max(maxF, 0.1);
                        ctx.fillStyle = '#ffc840';
                        ctx.fillRect(-w / 2, ly + h * (1 - ratio), w, h * ratio);
                    }
                    if (p.type === 'engine') {
                        ctx.fillStyle = '#b84020';
                        ctx.beginPath();
                        ctx.moveTo(-w / 2 - 2, ly + h);
                        ctx.lineTo(w / 2 + 2, ly + h);
                        ctx.lineTo(0, ly + h + 10);
                        ctx.closePath();
                        ctx.fill();
                    }
                    if (p.type === 'pod') {
                        ctx.fillStyle = '#80c8ff';
                        ctx.beginPath();
                        ctx.arc(0, ly + h / 2, w / 2 + 4, Math.PI, 0);
                        ctx.fill();
                    }
                }
                ctx.restore();
            }

            function drawFlame(wx, wy, angle, intensity) {
                if (intensity < 0.04) return;
                ctx.save();
                ctx.globalAlpha = intensity;
                ctx.translate(wx, wy);
                ctx.rotate(angle);
                let eng = parts[parts.length - 1];
                if (!eng || eng.type !== 'engine') { ctx.restore(); return; }
                let fy = eng._localY + eng._height;
                let fw = eng._width * 0.75;
                let grad = ctx.createLinearGradient(0, fy, 0, fy + 38 * intensity);
                grad.addColorStop(0, '#ffee44');
                grad.addColorStop(0.3, '#ff8800');
                grad.addColorStop(0.7, '#ff3300');
                grad.addColorStop(1, 'rgba(255,20,0,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.moveTo(-fw / 2, fy);
                ctx.lineTo(fw / 2, fy);
                ctx.lineTo(0, fy + 38 * intensity);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            function renderBuild() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                // Sky + ground
                let skyGrad = ctx.createLinearGradient(0, 0, 0, WORLD_GROUND_Y);
                skyGrad.addColorStop(0, '#0a1028');
                skyGrad.addColorStop(0.55, '#1a3050');
                skyGrad.addColorStop(1, '#7ab8e0');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, canvas.width, WORLD_GROUND_Y);
                drawStars(0.5);
                drawGroundAndSky(0.6);

                // Launchpad
                let padX = 250;
                let padY = 510;
                ctx.fillStyle = '#444';
                ctx.fillRect(padX - 50, padY, 100, 16);
                ctx.fillStyle = '#666';
                ctx.fillRect(padX - 30, padY - 5, 60, 8);
                ctx.fillStyle = '#888';
                ctx.fillRect(padX - 6, padY - 30, 12, 28);

                // Calculate rocket base position on pad
                let totalH = parts.reduce((s, p) => s + getPartHeight(p), 0);
                let rocketBaseY = padY;
                let rocketTopY = rocketBaseY - totalH;
                let rocketCX = padX;

                // Store part bounds for tap-to-remove
                buildPartBounds = [];
                let curY = rocketTopY;
                for (let i = 0; i < parts.length; i++) {
                    let h = getPartHeight(parts[i]);
                    let w = getPartWidth(parts[i]);
                    buildPartBounds.push({
                        index: i,
                        x: rocketCX - w / 2 - 4,
                        y: curY - 2,
                        w: w + 8,
                        h: h + 4,
                    });
                    curY += h;
                }

                // Draw rocket
                drawRocketAt(rocketCX, rocketBaseY, 0, 1);

                // Info text
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px "Segoe UI"';
                ctx.textAlign = 'center';
                ctx.fillText(`${parts.length} Teile | Masse: ${getTotalMass().toFixed(1)}t | Schub: ${getTotalThrust().toFixed(0)}t`, 250,
                    padY + 40);
                ctx.textAlign = 'start';
            }

            function renderFlight() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let altitude = WORLD_GROUND_Y - rocket.worldY;
                let spaceFactor = Math.min(1, Math.max(0, (altitude - 60) / 320));

                let camY = rocket.worldY - 380;
                let camX = rocket.worldX - canvas.width / 2;
                if (rocket.worldY > WORLD_GROUND_Y - 250) camY = WORLD_GROUND_Y - 630;

                // Background
                if (spaceFactor < 0.9) {
                    let bgGrad = ctx.createLinearGradient(0, WORLD_GROUND_Y - 350 - camY, 0, WORLD_GROUND_Y - camY);
                    bgGrad.addColorStop(0, '#0a1028');
                    bgGrad.addColorStop(0.5, `rgba(40,80,150,${0.7*(1-spaceFactor)})`);
                    bgGrad.addColorStop(1, `rgba(110,180,225,${1-spaceFactor})`);
                    ctx.fillStyle = bgGrad;
                } else {
                    ctx.fillStyle = '#040810';
                }
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (spaceFactor > 0.08) {
                    ctx.globalAlpha = spaceFactor;
                    drawStars(1);
                    ctx.globalAlpha = 1;
                }

                let groundScreenY = WORLD_GROUND_Y - camY;
                if (groundScreenY < canvas.height + 60) {
                    ctx.save();
                    ctx.translate(-camX, -camY);
                    drawGroundAndSky(1 - spaceFactor);
                    ctx.restore();
                }

                ctx.save();
                ctx.translate(-camX, -camY);
                drawRocketAt(rocket.worldX, rocket.worldY, rocket.angle, 1);
                if (thrustHeld && getTotalFuel() > 0.001 && hasEngine()) {
                    drawFlame(rocket.worldX, rocket.worldY, rocket.angle, throttle);
                }
                ctx.restore();

                if (spaceFactor > 0.7 && altitude > 180) {
                    ctx.fillStyle = 'rgba(255,255,255,0.65)';
                    ctx.font = 'bold 14px "Segoe UI"';
                    ctx.textAlign = 'center';
                    ctx.fillText('🌌 IM WELTRAUM', canvas.width / 2, 48);
                }
                ctx.textAlign = 'start';
            }

            // ═══════════════ GAME LOOP ═══════════════
            let lastTime = performance.now();

            function loop(now) {
                let dt = (now - lastTime) / 1000;
                if (dt > 0.1) dt = 0.1;
                lastTime = now;
                if (mode === 'flight') {
                    updateFlight(dt);
                    renderFlight();
                } else {
                    renderBuild();
                }
                requestAnimationFrame(loop);
            }

            // ═══════════════ INIT ═══════════════
            updateMassProperties();
            setMode('build');
            requestAnimationFrame(loop);

            window.addEventListener('resize', () => { if (mode === 'build') renderOverlay(); });
            window.addEventListener('orientationchange', () => { setTimeout(() => { if (mode === 'build')
                    renderOverlay(); }, 150); });
        })();
    </script>
</body>
</html>
