<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Anime Fight Game</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(to bottom, #87ceeb, #dff6ff 60%, #b7e4a8);
      font-family: Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .hud {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .bar-box {
      width: 48%;
      background: rgba(0,0,0,0.35);
      border: 2px solid white;
      border-radius: 14px;
      padding: 8px;
      color: white;
      font-weight: bold;
      text-shadow: 1px 1px 2px black;
    }

    .bar-label {
      margin-bottom: 6px;
      font-size: 14px;
    }

    .bar {
      width: 100%;
      height: 20px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 100%;
      transition: width 0.2s linear;
    }

    #playerHealth { background: linear-gradient(to right, #00ff7f, #00c853); }
    #enemyHealth { background: linear-gradient(to right, #ff5252, #d50000); }

    .arena {
      position: absolute;
      inset: 0;
    }

    .ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 18%;
      background: linear-gradient(to top, #6d4c41, #8d6e63);
      border-top: 4px solid #4e342e;
    }

    .fighter {
      position: absolute;
      width: 72px;
      height: 120px;
      bottom: 18%;
      border-radius: 16px;
      transition: transform 0.08s;
    }

    .fighter::before {
      content: "";
      position: absolute;
      top: -22px;
      left: 18px;
      width: 36px;
      height: 36px;
      background: #ffd7b5;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.2);
    }

    .fighter::after {
      content: "";
      position: absolute;
      top: -30px;
      left: 10px;
      width: 52px;
      height: 20px;
      border-radius: 50% 50% 20% 20%;
    }

    #player {
      left: 12%;
      background: linear-gradient(to bottom, #1976d2, #0d47a1);
      box-shadow: 0 0 20px rgba(0, 150, 255, 0.6);
    }

    #player::after {
      background: #ffeb3b;
    }

    #enemy {
      left: 72%;
      background: linear-gradient(to bottom, #c62828, #7f0000);
      box-shadow: 0 0 20px rgba(255, 50, 50, 0.6);
    }

    #enemy::after {
      background: #212121;
    }

    .face-right { transform: scaleX(1); }
    .face-left { transform: scaleX(-1); }

    .effect {
      position: absolute;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.9;
      animation: pop 0.25s ease-out forwards;
      z-index: 15;
    }

    @keyframes pop {
      0% { transform: scale(0.4); opacity: 1; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    .controls {
      position: absolute;
      bottom: 14px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 14px;
      z-index: 30;
      pointer-events: none;
    }

    .left-controls,
    .right-controls {
      display: flex;
      gap: 12px;
      pointer-events: auto;
    }

    .btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.16);
      color: white;
      font-size: 16px;
      font-weight: bold;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.25);
    }

    .btn:active {
      transform: scale(0.94);
      background: rgba(255,255,255,0.28);
    }

    .wide {
      width: 88px;
      border-radius: 18px;
    }

    #message {
      position: absolute;
      top: 48%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 18px 24px;
      background: rgba(0,0,0,0.65);
      color: white;
      border: 2px solid white;
      border-radius: 16px;
      font-size: 24px;
      font-weight: bold;
      z-index: 50;
      display: none;
      text-align: center;
    }

    #restartBtn {
      margin-top: 12px;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      background: #ffca28;
      color: #222;
    }

    .hint {
      position: absolute;
      top: 76px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(0,0,0,0.35);
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 13px;
      z-index: 20;
      text-shadow: 1px 1px 2px black;
    }

    @media (max-width: 600px) {
      .btn {
        width: 64px;
        height: 64px;
        font-size: 14px;
      }

      .wide {
        width: 82px;
      }

      .fighter {
        width: 64px;
        height: 110px;
      }

      .fighter::before {
        left: 15px;
      }

      .fighter::after {
        left: 7px;
      }
    }
  </style>
</head>
<body>
  <div id="game">
    <div class="hud">
      <div class="bar-box">
        <div class="bar-label">Spieler</div>
        <div class="bar">
          <div id="playerHealth" class="fill"></div>
        </div>
      </div>
      <div class="bar-box">
        <div class="bar-label">Gegner</div>
        <div class="bar">
          <div id="enemyHealth" class="fill"></div>
        </div>
      </div>
    </div>

    <div class="hint">Touch-Steuerung: L/R = laufen, ↑ = springen, Hit = schlagen, Skill = Spezial</div>

    <div class="arena">
      <div id="player" class="fighter face-right"></div>
      <div id="enemy" class="fighter face-left"></div>
      <div class="ground"></div>
    </div>

    <div id="message">
      <div id="messageText"></div>
      <button id="restartBtn">Neu starten</button>
    </div>

    <div class="controls">
      <div class="left-controls">
        <button class="btn" id="leftBtn">◀</button>
        <button class="btn" id="rightBtn">▶</button>
        <button class="btn" id="jumpBtn">↑</button>
      </div>
      <div class="right-controls">
        <button class="btn wide" id="attackBtn">Hit</button>
        <button class="btn wide" id="specialBtn">Skill</button>
      </div>
    </div>
  </div>

  <script>
    const game = document.getElementById("game");
    const playerEl = document.getElementById("player");
    const enemyEl = document.getElementById("enemy");
    const playerHealthEl = document.getElementById("playerHealth");
    const enemyHealthEl = document.getElementById("enemyHealth");
    const message = document.getElementById("message");
    const messageText = document.getElementById("messageText");
    const restartBtn = document.getElementById("restartBtn");

    const state = {
      gameOver: false,
      groundYPercent: 18,
      gravity: 0.8,
      player: {
        x: window.innerWidth * 0.12,
        y: 0,
        width: 72,
        height: 120,
        vx: 0,
        vy: 0,
        speed: 5,
        jumpPower: 15,
        health: 100,
        facing: 1,
        attacking: false,
        specialReady: true
      },
      enemy: {
        x: window.innerWidth * 0.72,
        y: 0,
        width: 72,
        height: 120,
        vx: 0,
        vy: 0,
        speed: 2.2,
        health: 100,
        facing: -1,
        attacking: false,
        specialCooldown: 0
      },
      controls: {
        left: false,
        right: false
      }
    };

    function resizeGame() {
      state.player.width = window.innerWidth < 600 ? 64 : 72;
      state.player.height = window.innerWidth < 600 ? 110 : 120;
      state.enemy.width = state.player.width;
      state.enemy.height = state.player.height;
    }

    window.addEventListener("resize", resizeGame);
    resizeGame();

    function groundY() {
      return 0;
    }

    function updateUI() {
      playerHealthEl.style.width = Math.max(0, state.player.health) + "%";
      enemyHealthEl.style.width = Math.max(0, state.enemy.health) + "%";
    }

    function render() {
      playerEl.style.left = state.player.x + "px";
      playerEl.style.bottom = `calc(${state.groundYPercent}% + ${state.player.y}px)`;
      enemyEl.style.left = state.enemy.x + "px";
      enemyEl.style.bottom = `calc(${state.groundYPercent}% + ${state.enemy.y}px)`;

      playerEl.className = "fighter " + (state.player.facing === 1 ? "face-right" : "face-left");
      enemyEl.className = "fighter " + (state.enemy.facing === 1 ? "face-right" : "face-left");
    }

    function clamp(val, min, max) {
      return Math.max(min, Math.min(max, val));
    }

    function distance(a, b) {
      return Math.abs((a.x + a.width / 2) - (b.x + b.width / 2));
    }

    function createEffect(x, y, color) {
      const fx = document.createElement("div");
      fx.className = "effect";
      fx.style.left = x + "px";
      fx.style.top = y + "px";
      fx.style.background = color;
      game.appendChild(fx);
      setTimeout(() => fx.remove(), 250);
    }

    function damageTarget(target, amount) {
      target.health -= amount;
      if (target.health < 0) target.health = 0;
      updateUI();
      checkWinner();
    }

    function playerAttack() {
      if (state.gameOver || state.player.attacking) return;
      state.player.attacking = true;

      const inRange = distance(state.player, state.enemy) < 110;
      playerEl.style.transform += " scale(1.05)";

      if (inRange) {
        damageTarget(state.enemy, 10);
        createEffect(
          state.enemy.x + state.enemy.width / 2,
          window.innerHeight * 0.55,
          "rgba(255,255,0,0.8)"
        );
      }

      setTimeout(() => {
        state.player.attacking = false;
      }, 220);
    }

    function playerSpecial() {
      if (state.gameOver || !state.player.specialReady) return;
      state.player.specialReady = false;

      const beam = document.createElement("div");
      beam.style.position = "absolute";
      beam.style.height = "18px";
      beam.style.width = "180px";
      beam.style.left = (state.player.facing === 1 ? state.player.x + 40 : state.player.x - 140) + "px";
      beam.style.bottom = `calc(${state.groundYPercent}% + ${state.player.y + 52}px)`;
      beam.style.background = "linear-gradient(to right, #00e5ff, #2979ff, #7c4dff)";
      beam.style.boxShadow = "0 0 20px #00e5ff";
      beam.style.borderRadius = "12px";
      beam.style.zIndex = "14";
      game.appendChild(beam);

      const hit =
        (state.player.facing === 1 &&
          state.enemy.x < state.player.x + 220 &&
          state.enemy.x > state.player.x) ||
        (state.player.facing === -1 &&
          state.enemy.x > state.player.x - 220 &&
          state.enemy.x < state.player.x);

      if (hit) {
        damageTarget(state.enemy, 22);
        createEffect(
          state.enemy.x + state.enemy.width / 2,
          window.innerHeight * 0.5,
          "rgba(0,229,255,0.9)"
        );
      }

      setTimeout(() => beam.remove(), 180);
      setTimeout(() => {
        state.player.specialReady = true;
      }, 2500);
    }

    function enemyAttack() {
      if (state.enemy.attacking || state.gameOver) return;
      state.enemy.attacking = true;

      if (distance(state.enemy, state.player) < 100) {
        damageTarget(state.player, 8);
        createEffect(
          state.player.x + state.player.width / 2,
          window.innerHeight * 0.55,
          "rgba(255,80,80,0.85)"
        );
      }

      setTimeout(() => {
        state.enemy.attacking = false;
      }, 350);
    }

    function enemyAI() {
      if (state.gameOver) return;

      const dx = state.player.x - state.enemy.x;
      state.enemy.facing = dx > 0 ? 1 : -1;

      if (Math.abs(dx) > 90) {
        state.enemy.x += Math.sign(dx) * state.enemy.speed;
      } else {
        if (Math.random() < 0.025) enemyAttack();
      }

      if (state.enemy.specialCooldown > 0) {
        state.enemy.specialCooldown--;
      } else if (Math.abs(dx) < 220 && Math.random() < 0.006) {
        state.enemy.specialCooldown = 220;
        damageTarget(state.player, 14);
        createEffect(
          state.player.x + state.player.width / 2,
          window.innerHeight * 0.45,
          "rgba(255,0,120,0.9)"
        );
      }
    }

    function updatePlayer() {
      if (state.controls.left) {
        state.player.vx = -state.player.speed;
        state.player.facing = -1;
      } else if (state.controls.right) {
        state.player.vx = state.player.speed;
        state.player.facing = 1;
      } else {
        state.player.vx = 0;
      }

      state.player.x += state.player.vx;
      state.player.vy -= state.gravity;
      state.player.y += state.player.vy;

      if (state.player.y <= groundY()) {
        state.player.y = groundY();
        state.player.vy = 0;
      }

      state.player.x = clamp(state.player.x, 0, window.innerWidth - state.player.width);
      state.enemy.x = clamp(state.enemy.x, 0, window.innerWidth - state.enemy.width);
    }

    function checkWinner() {
      if (state.gameOver) return;

      if (state.player.health <= 0) {
        state.gameOver = true;
        message.style.display = "block";
        messageText.textContent = "Du hast verloren!";
      } else if (state.enemy.health <= 0) {
        state.gameOver = true;
        message.style.display = "block";
        messageText.textContent = "Du hast gewonnen!";
      }
    }

    function jump() {
      if (state.gameOver) return;
      if (state.player.y === 0) {
        state.player.vy = state.player.jumpPower;
      }
    }

    function loop() {
      updatePlayer();
      enemyAI();
      render();
      requestAnimationFrame(loop);
    }

    function pressStart(button, fnStart, fnEnd) {
      const start = (e) => {
        e.preventDefault();
        fnStart();
      };
      const end = (e) => {
        e.preventDefault();
        if (fnEnd) fnEnd();
      };

      button.addEventListener("touchstart", start, { passive: false });
      button.addEventListener("touchend", end, { passive: false });
      button.addEventListener("touchcancel", end, { passive: false });

      button.addEventListener("mousedown", start);
      button.addEventListener("mouseup", end);
      button.addEventListener("mouseleave", end);
    }

    pressStart(document.getElementById("leftBtn"),
      () => state.controls.left = true,
      () => state.controls.left = false
    );

    pressStart(document.getElementById("rightBtn"),
      () => state.controls.right = true,
      () => state.controls.right = false
    );

    pressStart(document.getElementById("jumpBtn"), jump);
    pressStart(document.getElementById("attackBtn"), playerAttack);
    pressStart(document.getElementById("specialBtn"), playerSpecial);

    restartBtn.addEventListener("click", () => {
      state.gameOver = false;
      state.player.x = window.innerWidth * 0.12;
      state.player.y = 0;
      state.player.vy = 0;
      state.player.health = 100;
      state.player.specialReady = true;

      state.enemy.x = window.innerWidth * 0.72;
      state.enemy.health = 100;
      state.enemy.specialCooldown = 0;

      state.controls.left = false;
      state.controls.right = false;

      updateUI();
      message.style.display = "none";
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") {
        state.controls.left = true;
        state.player.facing = -1;
      }
      if (e.key === "ArrowRight") {
        state.controls.right = true;
        state.player.facing = 1;
      }
      if (e.key === "ArrowUp") jump();
      if (e.key === "a" || e.key === "A") playerAttack();
      if (e.key === "s" || e.key === "S") playerSpecial();
    });

    window.addEventListener("keyup", (e) => {
      if (e.key === "ArrowLeft") state.controls.left = false;
      if (e.key === "ArrowRight") state.controls.right = false;
    });

    updateUI();
    render();
    loop();
  </script>
</body>
</html>
