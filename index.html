<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>SPACE DRIFT • Mobile Space Simulator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: manipulation;
    }
    body {
      background: #0a0f1e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: 500px;
      max-height: 900px;
      box-shadow: 0 0 40px rgba(0, 180, 255, 0.3);
      border-radius: 0;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #1a1f35 0%, #03050a 100%);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none; /* prevent scroll/pinch on canvas */
    }
    .ui-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      pointer-events: none;
      gap: 12px;
      flex-wrap: wrap;
    }
    .controls {
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .virtual-stick {
      width: 110px;
      height: 110px;
      background: rgba(20, 30, 50, 0.65);
      backdrop-filter: blur(12px);
      border-radius: 50%;
      border: 2px solid rgba(80, 180, 255, 0.5);
      box-shadow: 0 10px 25px rgba(0,0,0,0.7), inset 0 0 20px rgba(0,160,255,0.3);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .stick-thumb {
      width: 55px;
      height: 55px;
      background: radial-gradient(circle at 30% 30%, #b3e0ff, #1e6fa0);
      border-radius: 50%;
      box-shadow: 0 4px 12px rgba(0,200,255,0.8);
      transition: background 0.1s;
      border: 2px solid white;
    }
    .throttle-slider {
      pointer-events: auto;
      width: 60px;
      height: 130px;
      background: rgba(20, 30, 50, 0.65);
      backdrop-filter: blur(12px);
      border-radius: 30px;
      border: 2px solid rgba(255, 180, 80, 0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 10px 0;
      box-shadow: 0 10px 25px rgba(0,0,0,0.7);
    }
    .throttle-fill {
      width: 18px;
      background: linear-gradient(0deg, #ff7b00, #ffb347);
      border-radius: 14px;
      box-shadow: 0 0 20px #ff9900;
      transition: height 0.05s linear;
    }
    .hud {
      pointer-events: auto;
      background: rgba(0, 5, 15, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 10px 18px;
      color: white;
      text-align: right;
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
      font-weight: bold;
      letter-spacing: 0.5px;
    }
    .speed-value {
      font-size: 28px;
      color: #ffcc80;
      line-height: 1.2;
    }
    .hud-label {
      font-size: 10px;
      text-transform: uppercase;
      color: #aaccff;
    }
    button {
      pointer-events: auto;
      background: rgba(255,255,255,0.9);
      border: none;
      border-radius: 20px;
      padding: 10px 16px;
      font-weight: bold;
      color: #0a1424;
      background: #e0f0ff;
      box-shadow: 0 4px 10px rgba(0,160,255,0.5);
      font-size: 14px;
      margin-top: 5px;
    }
    @media (max-width: 450px) {
      .virtual-stick {
        width: 90px;
        height: 90px;
      }
      .stick-thumb {
        width: 45px;
        height: 45px;
      }
      .throttle-slider {
        width: 45px;
        height: 100px;
      }
    }
  </style>
</head>
<body>
<div id="game-container">
  <canvas id="gameCanvas" width="500" height="900"></canvas>
  <div class="ui-panel">
    <div class="controls">
      <div class="virtual-stick" id="joystickZone">
        <div class="stick-thumb" id="stickThumb"></div>
      </div>
      <button id="resetBtn">⟳ RESET</button>
    </div>
    <div class="throttle-slider" id="throttleZone">
      <div class="throttle-fill" id="throttleFill" style="height: 40%;"></div>
    </div>
    <div class="hud">
      <div class="hud-label">SPEED</div>
      <div class="speed-value" id="speedDisplay">0.0</div>
      <div style="font-size:12px; color:#ccc;">m/s</div>
    </div>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // UI elements
    const joystickZone = document.getElementById('joystickZone');
    const stickThumb = document.getElementById('stickThumb');
    const throttleZone = document.getElementById('throttleZone');
    const throttleFill = document.getElementById('throttleFill');
    const speedDisplay = document.getElementById('speedDisplay');

    // ----- SIMULATION STATE -----
    let ship = {
      x: 250,
      y: 450,
      vx: 0,
      vy: 0,
      angle: 0,          // radians, 0 = pointing right
      thrust: 0,        // 0 to 1
      rotationSpeed: 0  // -1 to 1 from joystick
    };

    // Joystick values (normalized -1..1)
    let joystickX = 0;
    let joystickY = 0;
    let joystickActive = false;

    // Throttle 0..1
    let throttleLevel = 0.4; // default ~40%

    // Joystick dimensions
    let joystickRect = joystickZone.getBoundingClientRect();
    let joystickCenterX = 0, joystickCenterY = 0;
    let maxStickDistance = 38; // pixels from center

    // Throttle dimensions
    let throttleRect = throttleZone.getBoundingClientRect();
    let throttleTopY = 0, throttleBottomY = 0;

    // ----- PHYSICS CONSTANTS -----
    const MAX_THRUST = 280;       // pixels per second^2
    const DRAG = 0.98;           // space has tiny drag for smoothness
    const ROTATION_SPEED = 3.2;  // radians per second at full stick

    // Stars background
    let stars = [];
    const NUM_STARS = 180;

    // ----- INITIALIZE STARS -----
    function generateStars() {
      stars = [];
      for (let i = 0; i < NUM_STARS; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 2.2 + 0.6,
          brightness: Math.random() * 0.7 + 0.3,
          twinkle: Math.random() * Math.PI * 2
        });
      }
    }
    generateStars();

    // ----- RESIZE / UPDATE DIMENSIONS -----
    function updateUISizes() {
      joystickRect = joystickZone.getBoundingClientRect();
      joystickCenterX = joystickRect.left + joystickRect.width / 2;
      joystickCenterY = joystickRect.top + joystickRect.height / 2;
      maxStickDistance = (joystickRect.width / 2) * 0.75;

      throttleRect = throttleZone.getBoundingClientRect();
      throttleTopY = throttleRect.top + 15;
      throttleBottomY = throttleRect.bottom - 15;
    }
    window.addEventListener('resize', updateUISizes);
    updateUISizes();

    // ----- JOYSTICK CONTROLS (TOUCH & MOUSE) -----
    function handleJoystickStart(e) {
      e.preventDefault();
      joystickActive = true;
      updateJoystickFromEvent(e);
    }

    function handleJoystickMove(e) {
      if (!joystickActive) return;
      e.preventDefault();
      updateJoystickFromEvent(e);
    }

    function handleJoystickEnd(e) {
      e.preventDefault();
      joystickActive = false;
      joystickX = 0;
      joystickY = 0;
      updateStickThumbPosition(0, 0);
    }

    function updateJoystickFromEvent(e) {
      let clientX, clientY;
      if (e.touches) {
        if (e.touches.length === 0) return;
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }

      let dx = clientX - joystickCenterX;
      let dy = clientY - joystickCenterY;
      let distance = Math.sqrt(dx * dx + dy * dy);
      let maxDist = maxStickDistance;

      if (distance > maxDist) {
        dx = (dx / distance) * maxDist;
        dy = (dy / distance) * maxDist;
        distance = maxDist;
      }

      // Normalize to -1..1
      joystickX = dx / maxDist;
      joystickY = dy / maxDist;

      updateStickThumbPosition(dx, dy);
    }

    function updateStickThumbPosition(pixelDx, pixelDy) {
      stickThumb.style.transform = `translate(${pixelDx}px, ${pixelDy}px)`;
    }

    // ----- THROTTLE CONTROLS -----
    function handleThrottleStart(e) {
      e.preventDefault();
      updateThrottleFromEvent(e);
    }

    function handleThrottleMove(e) {
      e.preventDefault();
      updateThrottleFromEvent(e);
    }

    function updateThrottleFromEvent(e) {
      let clientY;
      if (e.touches) {
        if (e.touches.length === 0) return;
        clientY = e.touches[0].clientY;
      } else {
        clientY = e.clientY;
      }

      // Calculate fraction: top = 1.0, bottom = 0.0
      let range = throttleBottomY - throttleTopY;
      if (range <= 0) return;
      let raw = (clientY - throttleTopY) / range;
      throttleLevel = Math.min(1, Math.max(0, 1 - raw)); // invert: higher touch = higher throttle
      updateThrottleUI();
    }

    function updateThrottleUI() {
      let percent = throttleLevel * 100;
      throttleFill.style.height = `${percent}%`;
    }

    // Attach event listeners for joystick
    joystickZone.addEventListener('touchstart', handleJoystickStart, {passive: false});
    joystickZone.addEventListener('touchmove', handleJoystickMove, {passive: false});
    joystickZone.addEventListener('touchend', handleJoystickEnd);
    joystickZone.addEventListener('touchcancel', handleJoystickEnd);
    joystickZone.addEventListener('mousedown', handleJoystickStart);
    window.addEventListener('mousemove', (e) => {
      if (joystickActive) handleJoystickMove(e);
    });
    window.addEventListener('mouseup', (e) => {
      if (joystickActive) handleJoystickEnd(e);
    });

    // Attach throttle listeners
    throttleZone.addEventListener('touchstart', handleThrottleStart, {passive: false});
    throttleZone.addEventListener('touchmove', handleThrottleMove, {passive: false});
    throttleZone.addEventListener('mousedown', handleThrottleStart);
    window.addEventListener('mousemove', (e) => {
      // Only update throttle if mouse is down on throttle zone (simple approach)
      if (e.buttons === 1 && e.target === throttleZone || throttleZone.contains(e.target)) {
        updateThrottleFromEvent(e);
      }
    });

    // Reset button
    document.getElementById('resetBtn').addEventListener('click', () => {
      ship.x = canvas.width/2;
      ship.y = canvas.height/2;
      ship.vx = 0;
      ship.vy = 0;
      ship.angle = 0;
      ship.thrust = 0;
      joystickX = 0;
      joystickY = 0;
      throttleLevel = 0.4;
      updateThrottleUI();
      updateStickThumbPosition(0,0);
    });

    // ----- UPDATE LOOP -----
    function update(deltaTime) {
      // deltaTime in seconds, cap to avoid huge jumps
      let dt = Math.min(deltaTime, 0.05);

      // 1. Rotation from joystick horizontal axis
      ship.rotationSpeed = joystickX * ROTATION_SPEED;
      ship.angle += ship.rotationSpeed * dt;

      // 2. Thrust from throttle
      ship.thrust = throttleLevel;
      let thrustPower = ship.thrust * MAX_THRUST;

      // Apply thrust in direction of ship angle
      let thrustX = Math.cos(ship.angle) * thrustPower;
      let thrustY = Math.sin(ship.angle) * thrustPower;

      ship.vx += thrustX * dt;
      ship.vy += thrustY * dt;

      // 3. Apply drag (space dampening)
      ship.vx *= DRAG;
      ship.vy *= DRAG;

      // 4. Update position
      ship.x += ship.vx * dt;
      ship.y += ship.vy * dt;

      // 5. Wrap around edges (space torus)
      if (ship.x < -30) ship.x = canvas.width + 20;
      if (ship.x > canvas.width + 30) ship.x = -20;
      if (ship.y < -30) ship.y = canvas.height + 20;
      if (ship.y > canvas.height + 30) ship.y = -20;

      // Update speed display
      let speed = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
      speedDisplay.textContent = speed.toFixed(1);
    }

    // ----- RENDERING -----
    function drawStars() {
      for (let s of stars) {
        // subtle twinkle
        let twinkle = Math.sin(Date.now() * 0.002 + s.twinkle) * 0.2 + 0.8;
        let alpha = s.brightness * twinkle;
        ctx.fillStyle = `rgba(255, 240, 200, ${alpha})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
        ctx.fill();
      }
    }

    function drawShip() {
      ctx.save();
      ctx.translate(ship.x, ship.y);
      ctx.rotate(ship.angle);

      // Ship design: sleek arrow
      ctx.shadowColor = '#00ccff';
      ctx.shadowBlur = 14;

      // Main hull
      ctx.fillStyle = '#e0f0ff';
      ctx.beginPath();
      ctx.moveTo(18, 0);
      ctx.lineTo(-14, -9);
      ctx.lineTo(-6, 0);
      ctx.lineTo(-14, 9);
      ctx.closePath();
      ctx.fill();

      // Engine glow when thrusting
      if (ship.thrust > 0.05) {
        let glowIntensity = ship.thrust;
        ctx.shadowColor = '#ff8800';
        ctx.shadowBlur = 18 * glowIntensity;
        ctx.fillStyle = '#ffaa33';
        ctx.beginPath();
        ctx.moveTo(-10, 0);
        ctx.lineTo(-22, -6);
        ctx.lineTo(-22, 6);
        ctx.closePath();
        ctx.fill();

        // extra flame
        ctx.fillStyle = '#ff6600';
        ctx.shadowBlur = 25;
        ctx.beginPath();
        ctx.moveTo(-16, 0);
        ctx.lineTo(-26, -3.5);
        ctx.lineTo(-26, 3.5);
        ctx.closePath();
        ctx.fill();
      }

      // Cockpit
      ctx.fillStyle = '#7fd6ff';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(8, 0, 4.5, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = 'white';
      ctx.arc(10, -1, 2, 0, Math.PI*2);
      ctx.fill();

      ctx.restore();
    }

    function drawHUDDecorations() {
      ctx.fillStyle = '#aaccff';
      ctx.font = 'bold 12px "Segoe UI"';
      ctx.fillText('◈ SPACE DRIFT', 20, 40);
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawStars();

      // Draw faint grid for spatial reference
      ctx.strokeStyle = 'rgba(70, 130, 200, 0.15)';
      ctx.lineWidth = 0.6;
      for (let i = 0; i < canvas.width; i += 50) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.stroke();
      }
      for (let j = 0; j < canvas.height; j += 50) {
        ctx.beginPath();
        ctx.moveTo(0, j);
        ctx.lineTo(canvas.width, j);
        ctx.stroke();
      }

      drawShip();
      drawHUDDecorations();
    }

    // ----- GAME LOOP -----
    let lastTime = performance.now();

    function gameLoop(now) {
      let delta = (now - lastTime) / 1000; // seconds
      if (delta > 0.1) delta = 0.1; // clamp large gaps
      lastTime = now;

      update(delta);
      render();
      requestAnimationFrame(gameLoop);
    }

    // Start everything
    updateThrottleUI();
    updateStickThumbPosition(0, 0);
    requestAnimationFrame(gameLoop);

    // Recalculate sizes on orientation change or resize
    window.addEventListener('orientationchange', () => {
      setTimeout(updateUISizes, 80);
    });

  })();
</script>
</body>
</html>
