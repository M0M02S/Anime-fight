<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Anime Duell · Arcade-Stick</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(145deg, #0a0b1a 0%, #05070f 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 24px;
    }

    /* Hauptcontainer – größer, für iPad/Tablet optimiert */
    .game-container {
      max-width: 1100px;
      width: 100%;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      border-radius: 80px;
      padding: 24px 28px 32px;
      box-shadow: 0 30px 45px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.1);
      border: 1px solid rgba(255,200,80,0.5);
    }

    /* Arena mit größerer Canvas */
    .arena {
      background: radial-gradient(circle at 30% 20%, #1e2a3a, #080c18);
      border-radius: 60px;
      padding: 16px;
      margin-bottom: 28px;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 12px 25px rgba(0,0,0,0.5);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: #11151f;
      border-radius: 48px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      cursor: pointer;
    }

    /* Statistiken nebeneinander, grösser */
    .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 25px;
      margin: 25px 0 20px;
    }

    .stat-panel {
      flex: 1;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      border-radius: 48px;
      padding: 18px 20px;
      border-left: 6px solid;
      box-shadow: 0 8px 18px black;
    }

    .stat-panel.player {
      border-left-color: #3b82f6;
    }
    .stat-panel.enemy {
      border-left-color: #ef4444;
    }

    .stat-header {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      font-size: 1.4rem;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .stat-name {
      background: linear-gradient(135deg, #fff3cf, #ffda88);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 3px rgba(0,0,0,0.2);
    }
    .stat-number {
      color: #facc15;
      font-weight: 800;
      font-size: 1.4rem;
    }

    .bar-bg {
      background: #2a1e1e;
      border-radius: 40px;
      height: 18px;
      overflow: hidden;
      margin: 8px 0 10px;
      box-shadow: inset 0 1px 4px #000000aa;
    }
    .health-fill {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #f97316, #ef4444);
      border-radius: 40px;
      transition: width 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    .energy-fill {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #06b6d4);
      border-radius: 40px;
      transition: width 0.2s ease;
    }
    .energy-label {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #bbd9ff;
      display: flex;
      justify-content: space-between;
      font-weight: 500;
    }

    /* Kampflog – größere Schrift */
    .combat-log {
      background: #03070fee;
      backdrop-filter: blur(12px);
      border-radius: 48px;
      padding: 16px 24px;
      margin: 20px 0 28px;
      font-size: 1rem;
      font-weight: 500;
      color: #faeec2;
      border: 1px solid #facc1566;
      min-height: 90px;
      max-height: 120px;
      overflow-y: auto;
      font-family: monospace;
      letter-spacing: 0.5px;
      box-shadow: inset 0 0 8px #00000044;
    }

    .log-text {
      display: block;
      animation: fadeSlide 0.2s ease;
      word-break: break-word;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px);}
      to { opacity: 1; transform: translateY(0);}
    }

    /* JOYSTICK-STYLE BUTTONS (große runde Tasten) */
    .joystick-panel {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      margin-top: 15px;
      margin-bottom: 10px;
    }

    .stick-btn {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #2c2f3f, #131722);
      border: 3px solid rgba(255,215,100,0.7);
      box-shadow: 0 12px 20px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.5rem;
      color: #ffefcf;
      cursor: pointer;
      transition: 0.05s linear;
      touch-action: manipulation;
      backdrop-filter: blur(4px);
    }
    .stick-btn:active {
      transform: scale(0.94);
      box-shadow: 0 6px 12px black;
    }
    .stick-btn span {
      font-size: 2.2rem;
      display: block;
      margin-bottom: 6px;
    }
    .stick-btn .cost {
      font-size: 0.8rem;
      background: #00000099;
      padding: 3px 8px;
      border-radius: 30px;
      margin-top: 4px;
    }
    .stick-btn.special {
      background: radial-gradient(circle at 35% 35%, #4e2a7c, #251a3a);
      border-color: #e0aaff;
    }
    .stick-btn.heal {
      background: radial-gradient(circle at 35% 35%, #2b7a5c, #164034);
      border-color: #8bffc0;
    }
    .stick-btn.restart {
      background: radial-gradient(circle at 35% 35%, #8f3e4e, #4c1e2a);
      border-color: #ffb5b5;
      width: 110px;
      height: 110px;
    }

    @media (max-width: 750px) {
      .game-container {
        padding: 16px 20px 24px;
      }
      .stick-btn {
        width: 100px;
        height: 100px;
        font-size: 1.2rem;
      }
      .stick-btn span {
        font-size: 1.8rem;
      }
      .stat-header {
        font-size: 1.1rem;
      }
      .stat-number {
        font-size: 1.1rem;
      }
      .combat-log {
        font-size: 0.85rem;
      }
    }

    @media (max-width: 550px) {
      .stick-btn {
        width: 85px;
        height: 85px;
      }
      .stick-btn span {
        font-size: 1.5rem;
      }
      .joystick-panel {
        gap: 15px;
      }
    }

    button:disabled {
      opacity: 0.5;
      transform: scale(0.98);
      filter: grayscale(0.2);
      cursor: not-allowed;
    }

    footer {
      text-align: center;
      font-size: 0.75rem;
      color: #6c7fa0;
      margin-top: 24px;
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="arena">
    <canvas id="fightCanvas" width="800" height="320" style="width:100%; height:auto; max-width:800px; margin:0 auto; display:block;"></canvas>
  </div>

  <!-- Statistikbereich -->
  <div class="stats-row">
    <div class="stat-panel player">
      <div class="stat-header">
        <span class="stat-name">⚡ KAI · Sturmfaust</span>
        <span class="stat-number" id="playerHpText">100</span>
      </div>
      <div class="bar-bg"><div class="health-fill" id="playerHealthFill" style="width:100%"></div></div>
      <div class="energy-label">
        <span>🌀 Energie</span>
        <span id="playerEnergyText">50</span><span>/100</span>
      </div>
      <div class="bar-bg"><div class="energy-fill" id="playerEnergyFill" style="width:50%"></div></div>
    </div>

    <div class="stat-panel enemy">
      <div class="stat-header">
        <span class="stat-name">🔥 RYUJIN · Dämonenklaue</span>
        <span class="stat-number" id="enemyHpText">100</span>
      </div>
      <div class="bar-bg"><div class="health-fill" id="enemyHealthFill" style="width:100%"></div></div>
      <div class="energy-label">
        <span>🌀 Zorn</span>
        <span id="enemyEnergyText">40</span><span>/100</span>
      </div>
      <div class="bar-bg"><div class="energy-fill" id="enemyEnergyFill" style="width:40%"></div></div>
    </div>
  </div>

  <!-- Kampf-Log -->
  <div class="combat-log" id="combatLog">
    <span class="log-text">⚔️ Drücke den JOYSTICK für Angriff, Spezial oder Heilung!</span>
  </div>

  <!-- JOYSTICKS / große runde Buttons -->
  <div class="joystick-panel">
    <div class="stick-btn" id="attackJoystick">
      <span>⚡</span> ANGRIFF
      <div class="cost">—</div>
    </div>
    <div class="stick-btn special" id="specialJoystick">
      <span>✨</span> SPEZIAL
      <div class="cost">25 E</div>
    </div>
    <div class="stick-btn heal" id="healJoystick">
      <span>🌸</span> HEILEN
      <div class="cost">20 E</div>
    </div>
    <div class="stick-btn restart" id="restartJoystick">
      <span>🔄</span> NEU
    </div>
  </div>
  <footer>★ Rundenkampf – jeder Zug kostet nichts, Spezial & Heilung verbrauchen Energie ★</footer>
</div>

<script>
  (function() {
    // ----- SPIELSTATUS -----
    let player = {
      maxHp: 100,
      hp: 100,
      maxEnergy: 100,
      energy: 50
    };
    let enemy = {
      maxHp: 100,
      hp: 100,
      maxEnergy: 100,
      energy: 40
    };

    let gameActive = true;
    let actionLock = false;     // verhindert Spamming während Gegnerzug
    let canvas = document.getElementById('fightCanvas');
    let ctx = canvas.getContext('2d');

    // DOM-Elemente
    const playerHpText = document.getElementById('playerHpText');
    const enemyHpText = document.getElementById('enemyHpText');
    const playerEnergyText = document.getElementById('playerEnergyText');
    const enemyEnergyText = document.getElementById('enemyEnergyText');
    const playerHealthFill = document.getElementById('playerHealthFill');
    const enemyHealthFill = document.getElementById('enemyHealthFill');
    const playerEnergyFill = document.getElementById('playerEnergyFill');
    const enemyEnergyFill = document.getElementById('enemyEnergyFill');
    const combatLogDiv = document.getElementById('combatLog');

    // Joystick-Elemente
    const attackJoy = document.getElementById('attackJoystick');
    const specialJoy = document.getElementById('specialJoystick');
    const healJoy = document.getElementById('healJoystick');
    const restartJoy = document.getElementById('restartJoystick');

    // Hilfsfunktionen
    function addLogMessage(msg, isError = false) {
      const logEntry = document.createElement('span');
      logEntry.className = 'log-text';
      logEntry.style.color = isError ? '#ffb28b' : '#f2e8cf';
      logEntry.innerHTML = isError ? `⚠️ ${msg}` : `✦ ${msg}`;
      combatLogDiv.appendChild(logEntry);
      logEntry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      while(combatLogDiv.children.length > 14) {
        combatLogDiv.removeChild(combatLogDiv.firstChild);
      }
    }

    function updateUI() {
      const playerHpPercent = (player.hp / player.maxHp) * 100;
      const enemyHpPercent = (enemy.hp / enemy.maxHp) * 100;
      playerHealthFill.style.width = `${Math.max(0, playerHpPercent)}%`;
      enemyHealthFill.style.width = `${Math.max(0, enemyHpPercent)}%`;
      playerHpText.innerText = Math.max(0, player.hp);
      enemyHpText.innerText = Math.max(0, enemy.hp);

      const playerEnPercent = (player.energy / player.maxEnergy) * 100;
      const enemyEnPercent = (enemy.energy / enemy.maxEnergy) * 100;
      playerEnergyFill.style.width = `${Math.max(0, playerEnPercent)}%`;
      enemyEnergyFill.style.width = `${Math.max(0, enemyEnPercent)}%`;
      playerEnergyText.innerText = player.energy;
      enemyEnergyText.innerText = enemy.energy;
    }

    function clampStats() {
      player.hp = Math.min(player.maxHp, Math.max(0, player.hp));
      player.energy = Math.min(player.maxEnergy, Math.max(0, player.energy));
      enemy.hp = Math.min(enemy.maxHp, Math.max(0, enemy.hp));
      enemy.energy = Math.min(enemy.maxEnergy, Math.max(0, enemy.energy));
    }

    function disableJoysticks(disabled) {
      const joysticks = [attackJoy, specialJoy, healJoy];
      joysticks.forEach(joy => {
        if (disabled) joy.style.pointerEvents = 'none';
        else joy.style.pointerEvents = 'auto';
      });
    }

    function enableJoysticks() {
      if (gameActive && !checkGameOver()) {
        attackJoy.style.pointerEvents = 'auto';
        specialJoy.style.pointerEvents = 'auto';
        healJoy.style.pointerEvents = 'auto';
      } else {
        attackJoy.style.pointerEvents = 'none';
        specialJoy.style.pointerEvents = 'none';
        healJoy.style.pointerEvents = 'none';
      }
    }

    // Spielende prüfen
    function checkGameOver() {
      if (!gameActive) return true;
      let over = false;
      if (player.hp <= 0) {
        gameActive = false;
        over = true;
        addLogMessage("💀 KAI wurde besiegt... Niederlage. Drücke NEU für einen weiteren Kampf!");
        disableJoysticks(true);
      } else if (enemy.hp <= 0) {
        gameActive = false;
        over = true;
        addLogMessage("🏆 SIEG! RYUJIN ist am Boden. Du bist der Anime-Champion!");
        disableJoysticks(true);
      }
      if (over) {
        attackJoy.style.pointerEvents = 'none';
        specialJoy.style.pointerEvents = 'none';
        healJoy.style.pointerEvents = 'none';
        drawCanvas(true);
        return true;
      }
      return false;
    }

    // Energie-Regeneration nach Runde
    function regenerateAfterRound() {
      let oldPlayerEn = player.energy;
      let oldEnemyEn = enemy.energy;
      player.energy = Math.min(player.maxEnergy, player.energy + 10);
      enemy.energy = Math.min(enemy.maxEnergy, enemy.energy + 8);
      if (oldPlayerEn !== player.energy) addLogMessage(`🌀 Energie +10 (KAI) → ${player.energy}`);
      if (oldEnemyEn !== enemy.energy) addLogMessage(`🌑 Zorn +8 (RYUJIN) → ${enemy.energy}`);
      clampStats();
      updateUI();
      drawCanvas();
    }

    // Gegnerzug (KI)
    async function enemyTurn() {
      if (!gameActive) return;
      if (enemy.hp <= 0) return;
      addLogMessage(`⚔️ RYUJIN greift an!`);
      let damage = 0;
      let energyCost = 0;
      let willSpecial = (enemy.energy >= 25 && Math.random() < 0.45);

      if (willSpecial && enemy.energy >= 25) {
        damage = Math.floor(Math.random() * 13) + 16; // 16–28
        energyCost = 25;
        addLogMessage(`💢 RYUJIN „Dämonen-Klingensturm!“ ${damage} Schaden!`);
      } else {
        damage = Math.floor(Math.random() * 10) + 8; // 8–17
        addLogMessage(`🗡️ RYUJIN führt einen brutalen Hieb aus! ${damage} Schaden.`);
      }

      player.hp = Math.max(0, player.hp - damage);
      if (energyCost > 0) {
        enemy.energy = Math.max(0, enemy.energy - energyCost);
        addLogMessage(`🌀 RYUJIN verliert ${energyCost} Energie.`);
      }
      clampStats();
      updateUI();
      drawCanvas(true);  // Aufblitz

      if (player.hp <= 0) {
        addLogMessage(`💔 KAI bricht zusammen ... keine Kraft mehr.`);
        checkGameOver();
        return;
      }
    }

    async function finishRound() {
      if (!gameActive) return;
      regenerateAfterRound();
      clampStats();
      updateUI();
      drawCanvas();
      enableJoysticks();
      actionLock = false;
      checkGameOver();
      if (!gameActive) actionLock = true;
    }

    // Spieleraktion mit Sperre
    async function playerAction(actionFn) {
      if (actionLock || !gameActive) {
        addLogMessage("Warte, der Gegner ist am Zug ...", true);
        return false;
      }
      if (checkGameOver()) return false;
      actionLock = true;
      disableJoysticks(true);

      let success = await actionFn();
      if (!success) {
        actionLock = false;
        enableJoysticks();
        return false;
      }

      clampStats();
      updateUI();
      drawCanvas();

      if (checkGameOver()) {
        actionLock = false;
        return true;
      }

      await enemyTurn();
      if (checkGameOver()) {
        actionLock = false;
        disableJoysticks(true);
        return true;
      }

      await finishRound();
      return true;
    }

    // ----- SPIELERAKTIONEN (deutsch) -----
    function playerAttack() {
      return new Promise((resolve) => {
        let damage = Math.floor(Math.random() * 11) + 10; // 10–20
        addLogMessage(`⚡ KAI „Sturmfaust!“ ${damage} Schaden!`);
        enemy.hp = Math.max(0, enemy.hp - damage);
        clampStats();
        updateUI();
        drawCanvas(true);
        resolve(true);
      });
    }

    function playerSpecial() {
      return new Promise((resolve) => {
        if (player.energy < 25) {
          addLogMessage(`Nicht genug Energie! Spezial kostet 25 (aktuell ${player.energy})`, true);
          resolve(false);
          return;
        }
        let damage = Math.floor(Math.random() * 16) + 18; // 18–33
        addLogMessage(`✨✨ HIMMELSSTOSS – KAI entfesselt seine Geheimtechnik! ✨✨ ${damage} Schaden!`);
        enemy.hp = Math.max(0, enemy.hp - damage);
        player.energy = Math.max(0, player.energy - 25);
        clampStats();
        updateUI();
        drawCanvas(true);
        resolve(true);
      });
    }

    function playerHeal() {
      return new Promise((resolve) => {
        if (player.energy < 20) {
          addLogMessage(`Nicht genug Energie! Heilen kostet 20 (aktuell ${player.energy})`, true);
          resolve(false);
          return;
        }
        let healAmount = Math.floor(Math.random() * 14) + 12; // 12–25
        let newHp = Math.min(player.maxHp, player.hp + healAmount);
        let actualHeal = newHp - player.hp;
        player.hp = newHp;
        player.energy = Math.max(0, player.energy - 20);
        addLogMessage(`🌸 Meditations-Atem! +${actualHeal} HP wiederhergestellt. (Energie -20)`);
        clampStats();
        updateUI();
        drawCanvas();
        resolve(true);
      });
    }

    // Neustart
    function restartGame() {
      gameActive = true;
      actionLock = false;
      player = {
        maxHp: 100,
        hp: 100,
        maxEnergy: 100,
        energy: 50,
      };
      enemy = {
        maxHp: 100,
        hp: 100,
        maxEnergy: 100,
        energy: 40,
      };
      clampStats();
      updateUI();
      drawCanvas();
      combatLogDiv.innerHTML = '<span class="log-text">⚔️ Neustart! Die Joysticks sind bereit. Wähle deine Attacke!</span>';
      addLogMessage("Volle Gesundheit und Energie! Zeig, was du drauf hast.");
      attackJoy.style.pointerEvents = 'auto';
      specialJoy.style.pointerEvents = 'auto';
      healJoy.style.pointerEvents = 'auto';
      checkGameOver(); // sichert gameActive = true
    }

    // ----- CANVAS: größere Zeichenfläche, coole Anime-Darstellung -----
    function drawCanvas(flashEffect = false) {
      if (!ctx) return;
      ctx.clearRect(0, 0, 800, 320);
      ctx.fillStyle = "#10141f";
      ctx.fillRect(0, 0, 800, 320);
      // Boden
      ctx.fillStyle = "#201a2a";
      ctx.fillRect(0, 240, 800, 80);
      ctx.fillStyle = "#3a2a3c";
      for(let i=0; i<14; i++) ctx.fillRect(20+i*55, 260, 40, 12);

      // Spieler (links)
      ctx.beginPath();
      ctx.arc(180, 190, 50, 0, Math.PI*2);
      ctx.fillStyle = "#f7cf9f";
      ctx.fill();
      ctx.strokeStyle = "#b56f3a";
      ctx.lineWidth = 2;
      ctx.stroke();
      // Augen
      ctx.fillStyle = "#1f1f2a";
      ctx.beginPath();
      ctx.arc(155, 177, 9, 0, Math.PI*2);
      ctx.arc(205, 177, 9, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(151, 173, 3, 0, Math.PI*2);
      ctx.arc(201, 173, 3, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.arc(152, 176, 1.6, 0, Math.PI*2);
      ctx.arc(202, 176, 1.6, 0, Math.PI*2);
      ctx.fill();
      // Haare
      ctx.fillStyle = "#2c5f8a";
      ctx.beginPath();
      ctx.moveTo(145, 130);
      ctx.quadraticCurveTo(180, 100, 215, 130);
      ctx.lineTo(198, 146);
      ctx.lineTo(180, 137);
      ctx.lineTo(162, 146);
      ctx.fill();
      ctx.fillStyle = "#d45a2a";
      ctx.fillRect(145, 148, 70, 7);
      // Mund
      if(player.hp/player.maxHp > 0.4) {
        ctx.beginPath();
        ctx.arc(180, 210, 14, 0.1, Math.PI - 0.1);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.arc(180, 215, 10, 0, Math.PI);
        ctx.stroke();
      }
      // Gegner (rechts)
      ctx.beginPath();
      ctx.arc(620, 190, 52, 0, Math.PI*2);
      ctx.fillStyle = "#e0ac77";
      ctx.fill();
      ctx.fillStyle = "#4a2a2a";
      ctx.fillRect(595, 174, 14, 9);
      ctx.fillRect(631, 174, 14, 9);
      ctx.fillStyle = "#d97a4a";
      ctx.fillRect(599, 184, 10, 6);
      ctx.fillRect(635, 184, 10, 6);
      ctx.beginPath();
      ctx.moveTo(612, 200);
      ctx.lineTo(628, 204);
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = "#a13e2a";
      ctx.stroke();
      ctx.fillStyle = "#6b2e2e";
      ctx.beginPath();
      ctx.moveTo(603, 140);
      ctx.lineTo(620, 113);
      ctx.lineTo(637, 140);
      ctx.fill();
      if(enemy.hp > 0) {
        ctx.beginPath();
        ctx.arc(620, 190, 56, 0, Math.PI*2);
        ctx.strokeStyle = "#ff7a44";
        ctx.lineWidth = 2.2;
        ctx.stroke();
      }
      if(flashEffect) {
        ctx.fillStyle = "rgba(255,220,120,0.35)";
        ctx.fillRect(0, 0, 800, 320);
      }
      ctx.font = "bold 20px 'Segoe UI'";
      ctx.fillStyle = "#fff0cf";
      ctx.fillText("KAI", 135, 90);
      ctx.fillStyle = "#ffbb99";
      ctx.fillText("RYUJIN", 565, 85);
    }

    // Event-Bindung
    attackJoy.addEventListener('click', () => playerAction(playerAttack));
    specialJoy.addEventListener('click', () => playerAction(playerSpecial));
    healJoy.addEventListener('click', () => playerAction(playerHeal));
    restartJoy.addEventListener('click', () => restartGame());

    // Initialisierung
    function init() {
      updateUI();
      drawCanvas();
      gameActive = true;
      actionLock = false;
      enableJoysticks();
    }
    init();
  })();
</script>
</body>
</html>
